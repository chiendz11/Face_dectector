services:
  backend:
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"

  worker:
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - .env

  frontend-admin:
    restart: unless-stopped
    expose:
      - "8080"

  nginx:
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-admin
    environment:
      NGINX_RATE_LIMIT_ENABLED: ${NGINX_RATE_LIMIT_ENABLED:-true}
      NGINX_RATE_LIMIT_ZONE_RATE: ${NGINX_RATE_LIMIT_ZONE_RATE:-5r/s}
      NGINX_RATE_LIMIT_BURST: ${NGINX_RATE_LIMIT_BURST:-10}
      NGINX_RATE_LIMIT_MODE: ${NGINX_RATE_LIMIT_MODE:-nodelay}
    ports:
      - "80:8080"
