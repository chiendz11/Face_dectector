services:
  backend:
    image: "${IMAGE_HOST:-ghcr.io}/${REGISTRY_ORG}/face-detector-backend:${IMAGE_TAG}"
    depends_on:
      - db
      - redis
      - minio

  worker:
    image: "${IMAGE_HOST:-ghcr.io}/${REGISTRY_ORG}/face-detector-backend:${IMAGE_TAG}"
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    depends_on:
      - backend
      - db
      - redis
      - minio

  frontend-admin:
    image: "${IMAGE_HOST:-ghcr.io}/${REGISTRY_ORG}/face-detector-admin:${IMAGE_TAG}"

  nginx:
    image: "${IMAGE_HOST:-ghcr.io}/${REGISTRY_ORG}/face-detector-nginx:${IMAGE_TAG}"
    environment:
      NGINX_RATE_LIMIT_ENABLED: "false"

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
