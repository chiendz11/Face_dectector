services:
  edge-client:
    build:
      context: ./edge-client
    restart: unless-stopped
    env_file:
      - ./edge-client/.env
    ports:
      - "8080:8080"
    environment:
      EDGE_UI_MODE: web
      EDGE_KIOSK_HOST: 0.0.0.0
      EDGE_KIOSK_PORT: "8080"
    # Linux edge deployments should map the camera explicitly, for example:
    # devices:
    #   - /dev/video0:/dev/video0
