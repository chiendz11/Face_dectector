[pytest]
addopts = -p no:cacheprovider -m "not e2e and not integration"
norecursedirs = .tmp .local-pydeps .pytest_cache pytest-cache-files-* tests/e2e
markers =
	integration: service-level integration tests (app module interactions, no live HTTP ingress)
	e2e: full-stack HTTP smoke tests through nginx and backend against live dependencies
