apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.enrollmentStation.service.name }}
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: enrollment-station
spec:
  replicas: {{ .Values.enrollmentStation.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: face-detector
      app.kubernetes.io/component: enrollment-station
  template:
    metadata:
      labels:
        app.kubernetes.io/name: face-detector
        app.kubernetes.io/component: enrollment-station
    spec:
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
{{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: enrollment-station
          image: "{{ include "face-detector.imageRef" .Values.enrollmentStation.image }}"
          imagePullPolicy: {{ .Values.enrollmentStation.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: {{ .Values.enrollmentStation.service.containerPort }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.enrollmentStation.service.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.enrollmentStation.service.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.enrollmentStation.service.name }}
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: enrollment-station
spec:
  selector:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: enrollment-station
  ports:
    - name: http
      port: {{ .Values.enrollmentStation.service.port }}
      targetPort: {{ .Values.enrollmentStation.service.containerPort }}
  type: ClusterIP
