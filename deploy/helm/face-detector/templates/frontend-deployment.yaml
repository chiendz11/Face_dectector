apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontendAdmin.service.name }}
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: frontend-admin
spec:
  replicas: {{ .Values.frontendAdmin.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: face-detector
      app.kubernetes.io/component: frontend-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: face-detector
        app.kubernetes.io/component: frontend-admin
    spec:
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: frontend-admin
          image: "{{ .Values.frontendAdmin.image.repository }}:{{ .Values.frontendAdmin.image.tag }}"
          imagePullPolicy: {{ .Values.frontendAdmin.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontendAdmin.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontendAdmin.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontendAdmin.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontendAdmin.service.name }}
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: frontend-admin
spec:
  selector:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: frontend-admin
  ports:
    - name: http
      port: {{ .Values.frontendAdmin.service.port }}
      targetPort: {{ .Values.frontendAdmin.service.port }}
  type: ClusterIP
