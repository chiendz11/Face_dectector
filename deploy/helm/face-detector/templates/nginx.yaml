apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: nginx
data:
  nginx.conf.template: |
    pid /tmp/nginx.pid;

    events {}

    http {
      limit_req_zone $binary_remote_addr zone=api_req:10m rate=5r/s;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;

      upstream backend_upstream {
        server {{ .Values.backend.service.name }}:{{ .Values.backend.service.port }};
      }

      upstream admin_upstream {
        server {{ .Values.frontendAdmin.service.name }}:{{ .Values.frontendAdmin.service.port }};
      }

      server {
        listen {{ .Values.nginx.service.containerPort }};
        server_name _;
        client_max_body_size 20m;

        location = / {
          return 302 /admin/;
        }

        location = /admin {
          return 302 /admin/;
        }

        location = /health {
          proxy_pass http://backend_upstream/health;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
          limit_req zone=api_req burst=10 nodelay;
          limit_req_status 429;
          proxy_pass http://backend_upstream;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
          proxy_pass http://admin_upstream/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /enroll {
          return 302 /admin/;
        }

        location /enroll/ {
          return 302 /admin/;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nginx.service.name }}
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: nginx
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: face-detector
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: face-detector
        app.kubernetes.io/component: nginx
    spec:
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
{{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: "{{ include "face-detector.imageRef" .Values.nginx.image }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: {{ .Values.nginx.service.containerPort }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/nginx.conf.template
              subPath: nginx.conf.template
          readinessProbe:
            httpGet:
              path: /admin/
              port: {{ .Values.nginx.service.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nginx.service.name }}
  labels:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: nginx
  annotations:
{{- range $key, $value := .Values.nginx.service.annotations }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
spec:
  selector:
    app.kubernetes.io/name: face-detector
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: {{ .Values.nginx.service.containerPort }}
  type: {{ .Values.nginx.service.type }}
