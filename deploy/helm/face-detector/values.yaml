envSecretName: face-detector-env
imagePullSecrets: []

backend:
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  service:
    name: backend
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

migrationJob:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  command:
    - alembic
    - upgrade
    - head
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  command:
    - celery
    - -A
    - app.worker.celery_app.celery_app
    - worker
    - --loglevel=info
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    keda:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      pollingIntervalSeconds: 30
      cooldownPeriodSeconds: 300
      queue:
        listName: default
        targetLength: 5
        activationLength: 1
        databaseIndex: 0
        enableTLS: false
        addressEnvName: REDIS_ADDRESS
        usernameEnvName: ""
        passwordEnvName: REDIS_PASSWORD

frontendAdmin:
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  service:
    name: frontend-admin
    port: 80
    containerPort: 8080

nginx:
  replicaCount: 1
  image:
    repository: ""
    tag: 1.27-alpine
    digest: ""
    pullPolicy: IfNotPresent
  service:
    name: nginx
    type: LoadBalancer
    port: 80
    containerPort: 8080
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
