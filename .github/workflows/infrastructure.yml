name: Infrastructure Management

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      action:
        required: true
        type: string
      cluster_name:
        required: false
        type: string
        default: ""
      snapshot_bucket_name:
        required: false
        type: string
        default: ""
      node_instance_type:
        required: false
        type: string
        default: ""
      node_min_size:
        required: false
        type: string
        default: ""
      node_max_size:
        required: false
        type: string
        default: ""
      node_desired_size:
        required: false
        type: string
        default: ""
      pull_request_number:
        required: false
        type: string
        default: ""
      source_ref_name:
        required: false
        type: string
        default: ""
      source_git_sha:
        required: false
        type: string
        default: ""
      owner_login:
        required: false
        type: string
        default: ""
      sandbox_role_override_arn:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
          - staging
          - production
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      node_instance_type:
        description: Optional EKS node instance type override
        required: false
        default: ""
      node_min_size:
        description: Optional EKS node group minimum size override
        required: false
        default: ""
      node_max_size:
        description: Optional EKS node group maximum size override
        required: false
        default: ""
      node_desired_size:
        description: Optional EKS node group desired size override
        required: false
        default: ""
      pull_request_number:
        description: Optional sandbox PR number used for deterministic state when dispatching from the default branch
        required: false
        default: ""
      source_ref_name:
        description: Optional sandbox PR head branch used when dispatching from the default branch
        required: false
        default: ""
      source_git_sha:
        description: Optional sandbox PR head commit SHA used for env_version when dispatching from the default branch
        required: false
        default: ""
      sandbox_role_override_arn:
        description: Optional sandbox AWS role ARN override reserved for the workflow R&D lane
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ${{ inputs.environment == 'sandbox' && format('infrastructure-sandbox-{0}', inputs.pull_request_number || format('{0}-{1}', inputs.owner_login || 'admin', inputs.source_ref_name || github.ref_name)) || format('infrastructure-{0}', inputs.environment) }}
  cancel-in-progress: false

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION || 'ap-southeast-1' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.environment == 'sandbox' && inputs.source_ref_name != '' && (inputs.pull_request_number == '' || inputs.action == 'apply' || inputs.sandbox_role_override_arn != '') && inputs.source_ref_name || github.event.repository.default_branch }}

      - name: Reject unsupported manual sandbox workflow refs
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'sandbox' && github.ref_name != github.event.repository.default_branch && !startsWith(github.ref_name, 'devops/')
        run: |
          echo "Manual sandbox infrastructure runs are allowed only from the default branch or a devops/* branch." >&2
          echo "Dispatch on ${{ github.event.repository.default_branch }} for rescue, or use a devops/* branch for admin verification." >&2
          exit 1

      - name: Load workflow repo defaults
        env:
          AWS_ROLE_SANDBOX_ARN_OVERRIDE: ${{ inputs.sandbox_role_override_arn || '' }}
          AWS_ROLE_SANDBOX_ARN_SECRET: ${{ secrets.AWS_ROLE_SANDBOX_ARN || '' }}
          AWS_ROLE_STAGING_ARN_SECRET: ${{ secrets.AWS_ROLE_STAGING_ARN || '' }}
          AWS_ROLE_PRODUCTION_ARN_SECRET: ${{ secrets.AWS_ROLE_PRODUCTION_ARN || '' }}
          REPO_VARS_JSON: ${{ toJson(vars) }}
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import os

          repo_vars = json.loads(os.environ.get("REPO_VARS_JSON") or "{}")

          def repo(name: str, default: str = "") -> str:
            value = repo_vars.get(name)
            if value in (None, ""):
              return default
            return str(value)

          def first_non_empty(*values: str, default: str = "") -> str:
            for value in values:
              if value not in (None, ""):
                return str(value)
            return default

          values = {
            "AWS_ROLE_SANDBOX_ARN": first_non_empty(
              os.environ.get("AWS_ROLE_SANDBOX_ARN_OVERRIDE"),
              os.environ.get("AWS_ROLE_SANDBOX_ARN_SECRET"),
              repo_vars.get("AWS_ROLE_SANDBOX_ARN"),
            ),
            "AWS_ROLE_STAGING_ARN": first_non_empty(
              os.environ.get("AWS_ROLE_STAGING_ARN_SECRET"),
              repo_vars.get("AWS_ROLE_STAGING_ARN"),
            ),
            "AWS_ROLE_PRODUCTION_ARN": first_non_empty(
              os.environ.get("AWS_ROLE_PRODUCTION_ARN_SECRET"),
              repo_vars.get("AWS_ROLE_PRODUCTION_ARN"),
            ),
            "STAGING_CLUSTER_NAME": repo("STAGING_EKS_CLUSTER_NAME", "face-detector-staging"),
            "PRODUCTION_CLUSTER_NAME": repo("PRODUCTION_EKS_CLUSTER_NAME", "face-detector-production"),
            "SANDBOX_CLUSTER_PREFIX": repo("SANDBOX_EKS_CLUSTER_PREFIX", "face-detector-sbx"),
            "STAGING_SNAPSHOT_BUCKET_NAME": repo("STAGING_SNAPSHOT_BUCKET_NAME", "face-detector-employee-images-staging"),
            "PRODUCTION_SNAPSHOT_BUCKET_NAME": repo("PRODUCTION_SNAPSHOT_BUCKET_NAME", "face-detector-employee-images-production"),
            "SANDBOX_SNAPSHOT_BUCKET_PREFIX": repo("SANDBOX_SNAPSHOT_BUCKET_PREFIX", "face-detector-sbx"),
            "STAGING_NODE_INSTANCE_TYPE": repo("STAGING_NODE_INSTANCE_TYPE", "c7i-flex.large"),
            "PRODUCTION_NODE_INSTANCE_TYPE": repo("PRODUCTION_NODE_INSTANCE_TYPE", "m7i-flex.large"),
            "SANDBOX_NODE_INSTANCE_TYPE": repo("SANDBOX_NODE_INSTANCE_TYPE", "c7i-flex.large"),
            "STAGING_NODE_MIN_SIZE": repo("STAGING_NODE_MIN_SIZE", "1"),
            "STAGING_NODE_MAX_SIZE": repo("STAGING_NODE_MAX_SIZE", "2"),
            "STAGING_NODE_DESIRED_SIZE": repo("STAGING_NODE_DESIRED_SIZE", "1"),
            "PRODUCTION_NODE_MIN_SIZE": repo("PRODUCTION_NODE_MIN_SIZE", "2"),
            "PRODUCTION_NODE_MAX_SIZE": repo("PRODUCTION_NODE_MAX_SIZE", "6"),
            "PRODUCTION_NODE_DESIRED_SIZE": repo("PRODUCTION_NODE_DESIRED_SIZE", "2"),
            "SANDBOX_NODE_MIN_SIZE": repo("SANDBOX_NODE_MIN_SIZE", "1"),
            "SANDBOX_NODE_MAX_SIZE": repo("SANDBOX_NODE_MAX_SIZE", "2"),
            "SANDBOX_NODE_DESIRED_SIZE": repo("SANDBOX_NODE_DESIRED_SIZE", "1"),
            "SSM_KMS_KEY_ID": repo("SSM_KMS_KEY_ID"),
          }

          for key, value in values.items():
            print(f"{key}={value}")
          PY

      - name: Resolve infrastructure context
        id: context
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          REF_NAME: ${{ inputs.source_ref_name || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_REPOSITORY_SLUG: ${{ github.repository }}
          INPUT_CLUSTER_NAME: ${{ inputs.cluster_name || '' }}
          INPUT_SNAPSHOT_BUCKET_NAME: ${{ inputs.snapshot_bucket_name || '' }}
          INPUT_NODE_INSTANCE_TYPE: ${{ inputs.node_instance_type }}
          INPUT_NODE_MIN_SIZE: ${{ inputs.node_min_size }}
          INPUT_NODE_MAX_SIZE: ${{ inputs.node_max_size }}
          INPUT_NODE_DESIRED_SIZE: ${{ inputs.node_desired_size }}
          INPUT_OWNER_LOGIN: ${{ github.event_name == 'workflow_dispatch' && (inputs.owner_login || github.actor) || inputs.owner_login }}
          GIT_SHA: ${{ inputs.source_git_sha || github.sha }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/resolve_workflow_context.py \
            --mode infrastructure \
            --environment "$INPUT_ENVIRONMENT" \
            --action "$INPUT_ACTION" \
            --pull-request-number "$INPUT_PULL_REQUEST_NUMBER" \
            --ref-name "$REF_NAME" \
            --default-branch "$DEFAULT_BRANCH" \
            --repository-id "$REPOSITORY_ID" \
            --github-repository "$GITHUB_REPOSITORY_SLUG" \
            --github-token "$GITHUB_TOKEN" \
            --git-sha "$GIT_SHA" \
            --release-tag "$RELEASE_TAG" \
            --input-cluster-name "$INPUT_CLUSTER_NAME" \
            --input-snapshot-bucket-name "$INPUT_SNAPSHOT_BUCKET_NAME" \
            --input-node-instance-type "$INPUT_NODE_INSTANCE_TYPE" \
            --input-node-min-size "$INPUT_NODE_MIN_SIZE" \
            --input-node-max-size "$INPUT_NODE_MAX_SIZE" \
            --input-node-desired-size "$INPUT_NODE_DESIRED_SIZE" \
            --owner-login "$INPUT_OWNER_LOGIN" \
            --staging-cluster-name "$STAGING_CLUSTER_NAME" \
            --production-cluster-name "$PRODUCTION_CLUSTER_NAME" \
            --sandbox-cluster-prefix "$SANDBOX_CLUSTER_PREFIX" \
            --staging-snapshot-bucket-name "$STAGING_SNAPSHOT_BUCKET_NAME" \
            --production-snapshot-bucket-name "$PRODUCTION_SNAPSHOT_BUCKET_NAME" \
            --sandbox-snapshot-bucket-prefix "$SANDBOX_SNAPSHOT_BUCKET_PREFIX" \
            --staging-node-instance-type "$STAGING_NODE_INSTANCE_TYPE" \
            --production-node-instance-type "$PRODUCTION_NODE_INSTANCE_TYPE" \
            --sandbox-node-instance-type "$SANDBOX_NODE_INSTANCE_TYPE" \
            --staging-node-min-size "$STAGING_NODE_MIN_SIZE" \
            --staging-node-max-size "$STAGING_NODE_MAX_SIZE" \
            --staging-node-desired-size "$STAGING_NODE_DESIRED_SIZE" \
            --production-node-min-size "$PRODUCTION_NODE_MIN_SIZE" \
            --production-node-max-size "$PRODUCTION_NODE_MAX_SIZE" \
            --production-node-desired-size "$PRODUCTION_NODE_DESIRED_SIZE" \
            --sandbox-node-min-size "$SANDBOX_NODE_MIN_SIZE" \
            --sandbox-node-max-size "$SANDBOX_NODE_MAX_SIZE" \
            --sandbox-node-desired-size "$SANDBOX_NODE_DESIRED_SIZE" \
            --role-sandbox-arn "$AWS_ROLE_SANDBOX_ARN" \
            --role-staging-arn "$AWS_ROLE_STAGING_ARN" \
            --role-production-arn "$AWS_ROLE_PRODUCTION_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ steps.context.outputs.aws_role_arn }}
          role-session-name: gha-infrastructure-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      - name: Materialize backend runtime env file
        id: runtime-env
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ steps.context.outputs.deployment_environment }}
          TEMPLATE_ENVIRONMENT: ${{ steps.context.outputs.runtime_template_environment }}
          SANDBOX_BACKEND_ENV_FILE: ${{ secrets['SANDBOX_BACKEND_ENV_FILE'] }}
          STAGING_BACKEND_ENV_FILE: ${{ secrets.STAGING_BACKEND_ENV_FILE }}
          PRODUCTION_BACKEND_ENV_FILE: ${{ secrets.PRODUCTION_BACKEND_ENV_FILE }}
        run: |
          TEMPLATE_PATH="$GITHUB_WORKSPACE/deploy/runtime/backend.${TEMPLATE_ENVIRONMENT}.env.example"
          OUTPUT_PATH="$RUNNER_TEMP/backend-runtime.${DEPLOYMENT_ENVIRONMENT}.env"

          if [ "$DEPLOYMENT_ENVIRONMENT" = "production" ]; then
            ENV_CONTENT="$PRODUCTION_BACKEND_ENV_FILE"
          elif [ "$DEPLOYMENT_ENVIRONMENT" = "sandbox" ] && [ -n "$SANDBOX_BACKEND_ENV_FILE" ]; then
            ENV_CONTENT="$SANDBOX_BACKEND_ENV_FILE"
          else
            ENV_CONTENT="$STAGING_BACKEND_ENV_FILE"
          fi

          if [ -n "$ENV_CONTENT" ]; then
            printf '%s\n' "$ENV_CONTENT" > "$OUTPUT_PATH"
            echo "Using backend runtime env from GitHub secret for $DEPLOYMENT_ENVIRONMENT."
          else
            cat "$TEMPLATE_PATH" > "$OUTPUT_PATH"
            echo "No secret-backed runtime env provided for $DEPLOYMENT_ENVIRONMENT. Falling back to committed template $TEMPLATE_ENVIRONMENT." >&2
          fi

          echo "env_file_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Extract managed service credentials
        id: runtime-contract
        env:
          ACTION: ${{ inputs.action }}
          ENV_FILE_PATH: ${{ steps.runtime-env.outputs.env_file_path }}
        run: |
          python3 - "$ENV_FILE_PATH" "$ACTION" <<'PY'
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          action = sys.argv[2]
          entries = {}

          for raw_line in env_path.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in raw_line:
                  continue
              key, value = raw_line.split("=", 1)
              entries[key.strip()] = value.strip()

          required = {
              "POSTGRES_DB": entries.get("POSTGRES_DB", ""),
              "POSTGRES_USER": entries.get("POSTGRES_USER", ""),
              "POSTGRES_PASSWORD": entries.get("POSTGRES_PASSWORD", ""),
              "REDIS_PASSWORD": entries.get("REDIS_PASSWORD", ""),
          }

          missing = [key for key, value in required.items() if not value]
          if missing:
              raise SystemExit(f"Missing required backend runtime keys for managed services: {', '.join(missing)}")

          if action == "apply":
              placeholders = [
                  key for key, value in required.items()
                if value.startswith("change-me-")
              ]
              if placeholders:
                  raise SystemExit(
                      "Refusing to provision managed services with placeholder secrets. "
                      f"Update these keys first: {', '.join(placeholders)}"
                  )

          github_output = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              for key, value in {
                  "db_name": required["POSTGRES_DB"],
                  "db_username": required["POSTGRES_USER"],
                  "db_password": required["POSTGRES_PASSWORD"],
                  "redis_auth_token": required["REDIS_PASSWORD"],
              }.items():
                  handle.write(f"{key}<<EOF\n{value}\nEOF\n")
          PY

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="key=${{ steps.context.outputs.terraform_state_key }}" \
            -backend-config="region=${TF_STATE_REGION}"

      - name: Recover orphaned sandbox Helm releases
        if: inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox'
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
        run: |
          if ! aws eks describe-cluster --region "$TF_VAR_aws_region" --name "$TF_VAR_cluster_name" >/dev/null 2>&1; then
            echo "Cluster $TF_VAR_cluster_name does not exist yet. Skipping orphaned Helm release cleanup."
            exit 0
          fi

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

          terraform state list > "$RUNNER_TEMP/terraform-state.txt"
          aws eks update-kubeconfig --region "$TF_VAR_aws_region" --name "$TF_VAR_cluster_name" --alias "$TF_VAR_cluster_name"

          while IFS='|' read -r state_address release_name release_namespace; do
            if grep -Fxq "$state_address" "$RUNNER_TEMP/terraform-state.txt"; then
              continue
            fi

            if helm status "$release_name" -n "$release_namespace" >/dev/null 2>&1; then
              echo "Uninstalling orphaned Helm release $release_name in namespace $release_namespace before Terraform apply."
              helm uninstall "$release_name" -n "$release_namespace"
            fi
          done <<'EOF'
          helm_release.argocd|argocd|argocd
          helm_release.metrics_server|metrics-server|kube-system
          helm_release.keda[0]|keda|keda
          helm_release.cluster_autoscaler[0]|cluster-autoscaler|kube-system
          EOF

      - name: Terraform apply
        if: inputs.action == 'apply'
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: terraform apply -auto-approve -input=false

      - name: Dump sandbox ArgoCD diagnostics on failure
        if: failure() && inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME" --alias "$CLUSTER_NAME"

          echo "===== helm status argocd ====="
          helm status argocd -n argocd || true

          echo "===== kubectl get pods -n argocd -o wide ====="
          kubectl get pods -n argocd -o wide || true

          echo "===== kubectl get events -n argocd ====="
          kubectl get events -n argocd --sort-by=.lastTimestamp || true

          echo "===== kubectl describe pods -n argocd ====="
          kubectl describe pods -n argocd || true

      - name: Show infrastructure outputs
        if: inputs.action == 'apply'
        working-directory: terraform/eks
        run: terraform output

      - name: Mark sandbox as active
        if: success() && inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox' && steps.context.outputs.pull_request_number != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PR_NUMBER: ${{ steps.context.outputs.pull_request_number }}
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              labels: ['sandbox-active'],
            });

      - name: Build sandbox apply PR comment
        if: success() && inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox' && steps.context.outputs.pull_request_number != ''
        working-directory: terraform/eks
        env:
          PR_NUMBER: ${{ steps.context.outputs.pull_request_number }}
          SANDBOX_KEY: ${{ steps.context.outputs.sandbox_key }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          TERRAFORM_STATE_KEY: ${{ steps.context.outputs.terraform_state_key }}
          SSM_STATE_KEY: ${{ steps.context.outputs.ssm_state_key }}
          SNAPSHOT_BUCKET_NAME: ${{ steps.context.outputs.snapshot_bucket_name }}
          ENV_VERSION: ${{ steps.context.outputs.env_version }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          terraform output -json > "$RUNNER_TEMP/eks-outputs.json"
          CLUSTER_ENDPOINT=$(python3 - "$RUNNER_TEMP/eks-outputs.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          outputs = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print(outputs.get("cluster_endpoint", {}).get("value", ""))
          PY
          )

          python3 "$GITHUB_WORKSPACE/scripts/render_sandbox_status_comment.py" \
            --mode apply \
            --pull-request-number "$PR_NUMBER" \
            --sandbox-key "$SANDBOX_KEY" \
            --env-version "$ENV_VERSION" \
            --cluster-name "$CLUSTER_NAME" \
            --terraform-state-key "$TERRAFORM_STATE_KEY" \
            --ssm-state-key "$SSM_STATE_KEY" \
            --snapshot-bucket-name "$SNAPSHOT_BUCKET_NAME" \
            --cluster-endpoint "$CLUSTER_ENDPOINT" \
            --run-url "$RUN_URL" \
            > "$RUNNER_TEMP/sandbox-status-comment.md"

      - name: Publish sandbox apply PR comment
        if: success() && inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox' && steps.context.outputs.pull_request_number != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          COMMENT_FILE: ${{ runner.temp }}/sandbox-status-comment.md
          PR_NUMBER: ${{ steps.context.outputs.pull_request_number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = '<!-- sandbox-lifecycle-status -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
      - name: Cleanup sandbox AWS orphans before destroy
        if: inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          ENVIRONMENT_IDENTITY: ${{ steps.context.outputs.environment_identity }}
        run: |
          python3 scripts/cleanup_sandbox_aws_orphans.py \
            --region "$AWS_REGION" \
            --cluster-name "$CLUSTER_NAME" \
            --environment-identity "$ENVIRONMENT_IDENTITY"
      - name: Pre-clean sandbox application namespace before destroy
        if: inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          APP_NAMESPACE: facedetector
          ARGOCD_NAMESPACE: argocd
          ARGOCD_APPLICATION_NAME: face-detector-staging
        run: |
          if ! aws eks describe-cluster --region "$AWS_REGION" --name "$CLUSTER_NAME" >/dev/null 2>&1; then
            echo "Cluster $CLUSTER_NAME does not exist. Skipping sandbox application pre-cleanup."
            exit 0
          fi

          if ! command -v kubectl >/dev/null 2>&1; then
            curl -sSL -o kubectl "https://dl.k8s.io/release/v1.30.1/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl
          fi

          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME" --alias "$CLUSTER_NAME"

          if ! kubectl get namespace "$APP_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace $APP_NAMESPACE is already absent. Skipping sandbox application pre-cleanup."
            exit 0
          fi

          kubectl delete application "$ARGOCD_APPLICATION_NAME" -n "$ARGOCD_NAMESPACE" --ignore-not-found --wait=false || true
          kubectl delete namespace "$APP_NAMESPACE" --ignore-not-found --wait=false || true

          if kubectl wait --for=delete "namespace/$APP_NAMESPACE" --timeout=30s >/dev/null 2>&1; then
            echo "Namespace $APP_NAMESPACE deleted cleanly after the initial delete request."
            exit 0
          fi

          echo "Namespace $APP_NAMESPACE is still terminating. Deleting all remaining namespaced resources dynamically."
          kubectl api-resources --verbs=list,delete --namespaced -o name \
            | tr -d '\r' \
            | sort -u \
            | while IFS= read -r resource_name; do
                if [ -z "$resource_name" ]; then
                  continue
                fi

                kubectl delete "$resource_name" --all -n "$APP_NAMESPACE" --ignore-not-found --wait=false >/dev/null 2>&1 || true
              done

          if kubectl wait --for=delete "namespace/$APP_NAMESPACE" --timeout=30s >/dev/null 2>&1; then
            echo "Namespace $APP_NAMESPACE deleted after dynamic cleanup."
            exit 0
          fi

          echo "Namespace $APP_NAMESPACE is still terminating. Removing finalizers from remaining namespaced resources."
          kubectl api-resources --verbs=list --namespaced -o name \
            | tr -d '\r' \
            | sort -u \
            | while IFS= read -r resource_name; do
                if [ -z "$resource_name" ]; then
                  continue
                fi

                kubectl get "$resource_name" -n "$APP_NAMESPACE" -o name 2>/dev/null \
                  | while IFS= read -r object_name; do
                      if [ -z "$object_name" ]; then
                        continue
                      fi

                      kubectl patch "$object_name" -n "$APP_NAMESPACE" --type=merge -p '{"metadata":{"finalizers":[]}}' >/dev/null 2>&1 || true
                    done
              done

          kubectl delete namespace "$APP_NAMESPACE" --ignore-not-found --wait=false || true
          if kubectl wait --for=delete "namespace/$APP_NAMESPACE" --timeout=30s >/dev/null 2>&1; then
            echo "Namespace $APP_NAMESPACE deleted after clearing resource finalizers."
            exit 0
          fi

          echo "Namespace $APP_NAMESPACE is still terminating. Clearing namespace finalizers as a last resort."
          kubectl get namespace "$APP_NAMESPACE" -o json \
            | python3 -c "import json, sys; payload = json.load(sys.stdin); payload.setdefault('spec', {}).pop('finalizers', None); print(json.dumps(payload))" \
            | kubectl replace --raw "/api/v1/namespaces/$APP_NAMESPACE/finalize" -f - || true

          kubectl delete namespace "$APP_NAMESPACE" --ignore-not-found --wait=false || true

      - name: Remove pre-deleted sandbox app namespace from terraform state
        if: inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox'
        working-directory: terraform/eks
        run: |
          if terraform state list | grep -Fxq 'kubernetes_namespace.application'; then
            terraform state rm kubernetes_namespace.application
          else
            echo "kubernetes_namespace.application is already absent from terraform state."
          fi

      - name: Terraform destroy
        id: terraform_destroy_initial
        if: inputs.action == 'destroy'
        continue-on-error: true
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: terraform destroy -auto-approve -input=false

      - name: Cleanup sandbox AWS orphans after destroy
        if: always() && inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          ENVIRONMENT_IDENTITY: ${{ steps.context.outputs.environment_identity }}
        run: |
          python3 scripts/cleanup_sandbox_aws_orphans.py \
            --region "$AWS_REGION" \
            --cluster-name "$CLUSTER_NAME" \
            --environment-identity "$ENVIRONMENT_IDENTITY"

      - name: Retry Terraform destroy after orphan cleanup
        id: terraform_destroy_retry
        if: inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox' && steps.terraform_destroy_initial.outcome == 'failure'
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: terraform destroy -auto-approve -input=false

      - name: Fail if Terraform destroy did not complete
        if: |
          inputs.action == 'destroy' && (
            (steps.context.outputs.deployment_environment != 'sandbox' && steps.terraform_destroy_initial.outcome == 'failure') ||
            (steps.context.outputs.deployment_environment == 'sandbox' && steps.terraform_destroy_initial.outcome == 'failure' && steps.terraform_destroy_retry.outcome != 'success')
          )
        run: exit 1
      - name: Terraform destroy sandbox SSM parameters
        if: inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox'
        working-directory: terraform/ssm
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_environment: ${{ steps.context.outputs.ssm_environment_key }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_env_file_path: ${{ steps.runtime-env.outputs.env_file_path }}
        run: |
          export TF_VAR_kms_key_id="${SSM_KMS_KEY_ID:-}"
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="key=${{ steps.context.outputs.ssm_state_key }}" \
            -backend-config="region=${TF_STATE_REGION}"
          terraform destroy -auto-approve -input=false

      - name: Verify sandbox destroy convergence
        if: inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          TERRAFORM_STATE_KEY: ${{ steps.context.outputs.terraform_state_key }}
          SSM_STATE_KEY: ${{ steps.context.outputs.ssm_state_key }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          ENVIRONMENT_IDENTITY: ${{ steps.context.outputs.environment_identity }}
          SNAPSHOT_BUCKET_NAME: ${{ steps.context.outputs.snapshot_bucket_name }}
          SSM_ENVIRONMENT_KEY: ${{ steps.context.outputs.ssm_environment_key }}
        run: |
          set -euo pipefail

          pushd terraform/eks >/dev/null
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="key=${TERRAFORM_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" >/dev/null
          PRIMARY_STATE=$(terraform state list)
          popd >/dev/null

          if [ -n "$PRIMARY_STATE" ]; then
            echo "Primary sandbox terraform state is not empty after destroy:" >&2
            echo "$PRIMARY_STATE" >&2
            exit 1
          fi

          pushd terraform/ssm >/dev/null
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="key=${SSM_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" >/dev/null
          SECONDARY_STATE=$(terraform state list)
          popd >/dev/null

          if [ -n "$SECONDARY_STATE" ]; then
            echo "Sandbox SSM terraform state is not empty after destroy:" >&2
            echo "$SECONDARY_STATE" >&2
            exit 1
          fi

          if aws eks describe-cluster --region "$AWS_REGION" --name "$CLUSTER_NAME" >/dev/null 2>&1; then
            echo "EKS cluster $CLUSTER_NAME still exists after sandbox destroy." >&2
            aws eks describe-cluster --region "$AWS_REGION" --name "$CLUSTER_NAME" >&2 || true
            exit 1
          fi

          if aws s3api head-bucket --bucket "$SNAPSHOT_BUCKET_NAME" 2>"$RUNNER_TEMP/sandbox-head-bucket.err"; then
            echo "Snapshot bucket $SNAPSHOT_BUCKET_NAME still exists after sandbox destroy." >&2
            exit 1
          elif ! grep -Eiq '404|Not Found|NoSuchBucket' "$RUNNER_TEMP/sandbox-head-bucket.err"; then
            cat "$RUNNER_TEMP/sandbox-head-bucket.err" >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys


          def run_aws(*aws_args: str, expect_json: bool = True, allow_not_found: bool = False):
              command = ["aws", *aws_args, "--region", os.environ["AWS_REGION"]]
              if expect_json:
                  command.extend(["--output", "json"])

              completed = subprocess.run(command, capture_output=True, text=True)
              if completed.returncode != 0:
                  stderr = completed.stderr.strip()
                  if allow_not_found and any(
                      marker in stderr
                      for marker in (
                          "ResourceNotFoundException",
                          "NoSuchBucket",
                          "ParameterNotFound",
                          "ValidationError",
                          "Not Found",
                          "404",
                      )
                  ):
                      return None
                  raise SystemExit(
                      "AWS CLI command failed during sandbox destroy verification:\n"
                      f"  command: {' '.join(command)}\n"
                      f"  stderr: {stderr or completed.stdout.strip()}"
                  )

              if not expect_json:
                  return completed.stdout.strip()

              payload = completed.stdout.strip()
              return json.loads(payload) if payload else {}


          def tag_map(tags):
              return {item.get("Key", ""): item.get("Value", "") for item in (tags or [])}


          def has_cluster_marker(tags):
              cluster_name = os.environ["CLUSTER_NAME"]
              environment_identity = os.environ["ENVIRONMENT_IDENTITY"]
              tags_by_key = tag_map(tags)
              return any(
                  (
                      key == "eks:cluster-name" and value == cluster_name
                  )
                  or (
                      key == "facedetector:cluster-name" and value == cluster_name
                  )
                  or (
                      key == "facedetector:identity" and value == environment_identity
                  )
                  or (
                      key == f"k8s.io/cluster-autoscaler/{cluster_name}" and value == "owned"
                  )
                  or (
                      key == f"kubernetes.io/cluster/{cluster_name}" and value in {"owned", "shared"}
                  )
                  for key, value in tags_by_key.items()
              )


          residuals = []

          for vpc in run_aws("ec2", "describe-vpcs").get("Vpcs", []):
              if has_cluster_marker(vpc.get("Tags")):
                  residuals.append(f"vpc:{vpc['VpcId']}")

          for group in run_aws("ec2", "describe-security-groups").get("SecurityGroups", []):
              if group.get("GroupName") == "default":
                  continue
              if has_cluster_marker(group.get("Tags")):
                  residuals.append(f"security-group:{group['GroupId']}")

          for interface in run_aws("ec2", "describe-network-interfaces").get("NetworkInterfaces", []):
              if has_cluster_marker(interface.get("TagSet") or interface.get("Tags")):
                  residuals.append(f"network-interface:{interface['NetworkInterfaceId']}")

          for volume in run_aws("ec2", "describe-volumes", "--filters", "Name=status,Values=available").get("Volumes", []):
              if has_cluster_marker(volume.get("Tags")):
                  residuals.append(f"ebs-volume:{volume['VolumeId']}")

          for endpoint in run_aws("ec2", "describe-vpc-endpoints").get("VpcEndpoints", []):
              if endpoint.get("State") in {"deleted", "deleting"}:
                  continue
              if has_cluster_marker(endpoint.get("Tags")):
                  residuals.append(f"vpc-endpoint:{endpoint['VpcEndpointId']}")

          for connection in run_aws("ec2", "describe-vpc-peering-connections").get("VpcPeeringConnections", []):
              if connection.get("Status", {}).get("Code") in {"deleted", "rejected", "failed"}:
                  continue
              if has_cluster_marker(connection.get("Tags")):
                  residuals.append(f"vpc-peering:{connection['VpcPeeringConnectionId']}")

          for load_balancer in run_aws("elbv2", "describe-load-balancers").get("LoadBalancers", []):
              tags_response = run_aws(
                  "elbv2",
                  "describe-tags",
                  "--resource-arns",
                  load_balancer["LoadBalancerArn"],
                  allow_not_found=True,
              )
              tag_descriptions = tags_response.get("TagDescriptions", []) if tags_response else []
              tags = tag_descriptions[0].get("Tags", []) if tag_descriptions else []
              if has_cluster_marker(tags):
                  residuals.append(f"elbv2:{load_balancer['LoadBalancerArn']}")

          for load_balancer in run_aws("elb", "describe-load-balancers").get("LoadBalancerDescriptions", []):
              tags_response = run_aws(
                  "elb",
                  "describe-tags",
                  "--load-balancer-names",
                  load_balancer["LoadBalancerName"],
                  allow_not_found=True,
              )
              descriptions = tags_response.get("TagDescriptions", []) if tags_response else []
              tags = descriptions[0].get("Tags", []) if descriptions else []
              if has_cluster_marker(tags):
                  residuals.append(f"classic-elb:{load_balancer['LoadBalancerName']}")

          ssm_environment_key = os.environ["SSM_ENVIRONMENT_KEY"].strip()
          if ssm_environment_key:
              parameters = run_aws(
                  "ssm",
                  "get-parameters-by-path",
                  "--path",
                  f"/facedetector/{ssm_environment_key}",
                  "--recursive",
              )
              parameter_names = [item["Name"] for item in parameters.get("Parameters", [])]
              if parameter_names:
                  residuals.extend(f"ssm-parameter:{name}" for name in parameter_names)

          if residuals:
              print("Sandbox destroy verification found residual resources:", file=sys.stderr)
              for item in residuals:
                  print(f"  - {item}", file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Mark sandbox as inactive
        if: success() && inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox' && steps.context.outputs.pull_request_number != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PR_NUMBER: ${{ steps.context.outputs.pull_request_number }}
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(process.env.PR_NUMBER),
                name: 'sandbox-active',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(process.env.PR_NUMBER),
                name: 'sandbox-validated',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
      - name: Build sandbox destroy PR comment
        if: success() && inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox' && steps.context.outputs.pull_request_number != ''
        env:
          PR_NUMBER: ${{ steps.context.outputs.pull_request_number }}
          SANDBOX_KEY: ${{ steps.context.outputs.sandbox_key }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          ENV_VERSION: ${{ steps.context.outputs.env_version }}
          TERRAFORM_STATE_KEY: ${{ steps.context.outputs.terraform_state_key }}
          SSM_STATE_KEY: ${{ steps.context.outputs.ssm_state_key }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/render_sandbox_status_comment.py \
            --mode destroy \
            --pull-request-number "$PR_NUMBER" \
            --sandbox-key "$SANDBOX_KEY" \
            --env-version "$ENV_VERSION" \
            --cluster-name "$CLUSTER_NAME" \
            --terraform-state-key "$TERRAFORM_STATE_KEY" \
            --ssm-state-key "$SSM_STATE_KEY" \
            --run-url "$RUN_URL" \
            > "$RUNNER_TEMP/sandbox-status-comment.md"

      - name: Publish sandbox destroy PR comment
        if: success() && inputs.action == 'destroy' && steps.context.outputs.deployment_environment == 'sandbox' && steps.context.outputs.pull_request_number != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          COMMENT_FILE: ${{ runner.temp }}/sandbox-status-comment.md
          PR_NUMBER: ${{ steps.context.outputs.pull_request_number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = '<!-- sandbox-lifecycle-status -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

