name: Infrastructure Management

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      action:
        required: true
        type: string
      cluster_name:
        required: false
        type: string
        default: ""
      snapshot_bucket_name:
        required: false
        type: string
        default: ""
      node_instance_type:
        required: false
        type: string
        default: ""
      node_min_size:
        required: false
        type: string
        default: ""
      node_max_size:
        required: false
        type: string
        default: ""
      node_desired_size:
        required: false
        type: string
        default: ""
      pull_request_number:
        required: false
        type: string
        default: ""
      source_ref_name:
        required: false
        type: string
        default: ""
      source_git_sha:
        required: false
        type: string
        default: ""
      owner_login:
        required: false
        type: string
        default: ""
      sandbox_role_override_arn:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
          - staging
          - production
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      cluster_name:
        description: Optional sandbox EKS cluster name override. Shared staging and production ignore overrides and will fail fast.
        required: false
        default: ""
      snapshot_bucket_name:
        description: Optional sandbox S3 bucket name override for archived snapshots
        required: false
        default: ""
      node_instance_type:
        description: Optional EKS node instance type override
        required: false
        default: ""
      node_min_size:
        description: Optional EKS node group minimum size override
        required: false
        default: ""
      node_max_size:
        description: Optional EKS node group maximum size override
        required: false
        default: ""
      node_desired_size:
        description: Optional EKS node group desired size override
        required: false
        default: ""
      pull_request_number:
        description: Optional sandbox PR number used for deterministic state when dispatching from the default branch
        required: false
        default: ""
      source_ref_name:
        description: Optional sandbox PR head branch used when dispatching from the default branch
        required: false
        default: ""
      source_git_sha:
        description: Optional sandbox PR head commit SHA used for env_version when dispatching from the default branch
        required: false
        default: ""
      owner_login:
        description: Optional sandbox owner login used for cost-allocation tags
        required: false
        default: ""
      sandbox_role_override_arn:
        description: Optional sandbox AWS role ARN override reserved for the workflow R&D lane
        required: false
        default: ""

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION || 'ap-southeast-1' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.environment == 'sandbox' && inputs.action == 'apply' && (inputs.source_ref_name || github.ref_name) || github.event.repository.default_branch }}

      - name: Reject unsupported manual sandbox workflow refs
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'sandbox' && github.ref_name != github.event.repository.default_branch && !startsWith(github.ref_name, 'devops/')
        run: |
          echo "Manual sandbox infrastructure runs are allowed only from the default branch or a devops/* branch." >&2
          echo "Dispatch on ${{ github.event.repository.default_branch }} for rescue, or use a devops/* branch for admin verification." >&2
          exit 1

      - name: Resolve infrastructure context
        id: context
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          REF_NAME: ${{ inputs.source_ref_name || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_REPOSITORY_SLUG: ${{ github.repository }}
          INPUT_CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
          INPUT_SNAPSHOT_BUCKET_NAME: ${{ github.event.inputs.snapshot_bucket_name }}
          INPUT_NODE_INSTANCE_TYPE: ${{ github.event.inputs.node_instance_type }}
          INPUT_NODE_MIN_SIZE: ${{ github.event.inputs.node_min_size }}
          INPUT_NODE_MAX_SIZE: ${{ github.event.inputs.node_max_size }}
          INPUT_NODE_DESIRED_SIZE: ${{ github.event.inputs.node_desired_size }}
          INPUT_OWNER_LOGIN: ${{ inputs.owner_login }}
          GIT_SHA: ${{ inputs.source_git_sha || github.sha }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          GITHUB_TOKEN: ${{ github.token }}
          AWS_ROLE_SANDBOX_ARN: ${{ inputs.sandbox_role_override_arn || secrets.AWS_ROLE_SANDBOX_ARN || vars['AWS_ROLE_SANDBOX_ARN'] || '' }}
          AWS_ROLE_STAGING_ARN: ${{ secrets.AWS_ROLE_STAGING_ARN || vars['AWS_ROLE_STAGING_ARN'] || '' }}
          AWS_ROLE_PRODUCTION_ARN: ${{ secrets.AWS_ROLE_PRODUCTION_ARN || vars['AWS_ROLE_PRODUCTION_ARN'] || '' }}
          STAGING_CLUSTER_NAME: ${{ vars.STAGING_EKS_CLUSTER_NAME || 'face-detector-staging' }}
          PRODUCTION_CLUSTER_NAME: ${{ vars.PRODUCTION_EKS_CLUSTER_NAME || 'face-detector-production' }}
          SANDBOX_CLUSTER_PREFIX: ${{ vars['SANDBOX_EKS_CLUSTER_PREFIX'] || 'face-detector-sbx' }}
          STAGING_SNAPSHOT_BUCKET_NAME: ${{ vars.STAGING_SNAPSHOT_BUCKET_NAME || 'face-detector-employee-images-staging' }}
          PRODUCTION_SNAPSHOT_BUCKET_NAME: ${{ vars.PRODUCTION_SNAPSHOT_BUCKET_NAME || 'face-detector-employee-images-production' }}
          SANDBOX_SNAPSHOT_BUCKET_PREFIX: ${{ vars['SANDBOX_SNAPSHOT_BUCKET_PREFIX'] || 'face-detector-sbx' }}
          STAGING_NODE_INSTANCE_TYPE: ${{ vars.STAGING_NODE_INSTANCE_TYPE || 'c7i-flex.large' }}
          PRODUCTION_NODE_INSTANCE_TYPE: ${{ vars.PRODUCTION_NODE_INSTANCE_TYPE || 'm7i-flex.large' }}
          SANDBOX_NODE_INSTANCE_TYPE: ${{ vars['SANDBOX_NODE_INSTANCE_TYPE'] || 'c7i-flex.large' }}
          STAGING_NODE_MIN_SIZE: ${{ vars.STAGING_NODE_MIN_SIZE || '1' }}
          STAGING_NODE_MAX_SIZE: ${{ vars.STAGING_NODE_MAX_SIZE || '2' }}
          STAGING_NODE_DESIRED_SIZE: ${{ vars.STAGING_NODE_DESIRED_SIZE || '1' }}
          PRODUCTION_NODE_MIN_SIZE: ${{ vars.PRODUCTION_NODE_MIN_SIZE || '2' }}
          PRODUCTION_NODE_MAX_SIZE: ${{ vars.PRODUCTION_NODE_MAX_SIZE || '6' }}
          PRODUCTION_NODE_DESIRED_SIZE: ${{ vars.PRODUCTION_NODE_DESIRED_SIZE || '2' }}
          SANDBOX_NODE_MIN_SIZE: ${{ vars['SANDBOX_NODE_MIN_SIZE'] || '1' }}
          SANDBOX_NODE_MAX_SIZE: ${{ vars['SANDBOX_NODE_MAX_SIZE'] || '2' }}
          SANDBOX_NODE_DESIRED_SIZE: ${{ vars['SANDBOX_NODE_DESIRED_SIZE'] || '1' }}
        run: |
          python3 scripts/resolve_workflow_context.py \
            --mode infrastructure \
            --environment "$INPUT_ENVIRONMENT" \
            --action "$INPUT_ACTION" \
            --pull-request-number "$INPUT_PULL_REQUEST_NUMBER" \
            --ref-name "$REF_NAME" \
            --default-branch "$DEFAULT_BRANCH" \
            --repository-id "$REPOSITORY_ID" \
            --github-repository "$GITHUB_REPOSITORY_SLUG" \
            --github-token "$GITHUB_TOKEN" \
            --git-sha "$GIT_SHA" \
            --release-tag "$RELEASE_TAG" \
            --input-cluster-name "$INPUT_CLUSTER_NAME" \
            --input-snapshot-bucket-name "$INPUT_SNAPSHOT_BUCKET_NAME" \
            --input-node-instance-type "$INPUT_NODE_INSTANCE_TYPE" \
            --input-node-min-size "$INPUT_NODE_MIN_SIZE" \
            --input-node-max-size "$INPUT_NODE_MAX_SIZE" \
            --input-node-desired-size "$INPUT_NODE_DESIRED_SIZE" \
            --owner-login "$INPUT_OWNER_LOGIN" \
            --staging-cluster-name "$STAGING_CLUSTER_NAME" \
            --production-cluster-name "$PRODUCTION_CLUSTER_NAME" \
            --sandbox-cluster-prefix "$SANDBOX_CLUSTER_PREFIX" \
            --staging-snapshot-bucket-name "$STAGING_SNAPSHOT_BUCKET_NAME" \
            --production-snapshot-bucket-name "$PRODUCTION_SNAPSHOT_BUCKET_NAME" \
            --sandbox-snapshot-bucket-prefix "$SANDBOX_SNAPSHOT_BUCKET_PREFIX" \
            --staging-node-instance-type "$STAGING_NODE_INSTANCE_TYPE" \
            --production-node-instance-type "$PRODUCTION_NODE_INSTANCE_TYPE" \
            --sandbox-node-instance-type "$SANDBOX_NODE_INSTANCE_TYPE" \
            --staging-node-min-size "$STAGING_NODE_MIN_SIZE" \
            --staging-node-max-size "$STAGING_NODE_MAX_SIZE" \
            --staging-node-desired-size "$STAGING_NODE_DESIRED_SIZE" \
            --production-node-min-size "$PRODUCTION_NODE_MIN_SIZE" \
            --production-node-max-size "$PRODUCTION_NODE_MAX_SIZE" \
            --production-node-desired-size "$PRODUCTION_NODE_DESIRED_SIZE" \
            --sandbox-node-min-size "$SANDBOX_NODE_MIN_SIZE" \
            --sandbox-node-max-size "$SANDBOX_NODE_MAX_SIZE" \
            --sandbox-node-desired-size "$SANDBOX_NODE_DESIRED_SIZE" \
            --role-sandbox-arn "$AWS_ROLE_SANDBOX_ARN" \
            --role-staging-arn "$AWS_ROLE_STAGING_ARN" \
            --role-production-arn "$AWS_ROLE_PRODUCTION_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.context.outputs.aws_role_arn }}
          role-session-name: gha-infrastructure-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      - name: Materialize backend runtime env file
        id: runtime-env
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ steps.context.outputs.deployment_environment }}
          TEMPLATE_ENVIRONMENT: ${{ steps.context.outputs.runtime_template_environment }}
          SANDBOX_BACKEND_ENV_FILE: ${{ secrets['SANDBOX_BACKEND_ENV_FILE'] }}
          STAGING_BACKEND_ENV_FILE: ${{ secrets.STAGING_BACKEND_ENV_FILE }}
          PRODUCTION_BACKEND_ENV_FILE: ${{ secrets.PRODUCTION_BACKEND_ENV_FILE }}
        run: |
          TEMPLATE_PATH="$GITHUB_WORKSPACE/deploy/runtime/backend.${TEMPLATE_ENVIRONMENT}.env.example"
          OUTPUT_PATH="$RUNNER_TEMP/backend-runtime.${DEPLOYMENT_ENVIRONMENT}.env"

          if [ "$DEPLOYMENT_ENVIRONMENT" = "production" ]; then
            ENV_CONTENT="$PRODUCTION_BACKEND_ENV_FILE"
          elif [ "$DEPLOYMENT_ENVIRONMENT" = "sandbox" ] && [ -n "$SANDBOX_BACKEND_ENV_FILE" ]; then
            ENV_CONTENT="$SANDBOX_BACKEND_ENV_FILE"
          else
            ENV_CONTENT="$STAGING_BACKEND_ENV_FILE"
          fi

          if [ -n "$ENV_CONTENT" ]; then
            printf '%s\n' "$ENV_CONTENT" > "$OUTPUT_PATH"
            echo "Using backend runtime env from GitHub secret for $DEPLOYMENT_ENVIRONMENT."
          else
            cat "$TEMPLATE_PATH" > "$OUTPUT_PATH"
            echo "No secret-backed runtime env provided for $DEPLOYMENT_ENVIRONMENT. Falling back to committed template $TEMPLATE_ENVIRONMENT." >&2
          fi

          echo "env_file_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Extract managed service credentials
        id: runtime-contract
        env:
          ACTION: ${{ github.event.inputs.action }}
          ENV_FILE_PATH: ${{ steps.runtime-env.outputs.env_file_path }}
        run: |
          python3 - "$ENV_FILE_PATH" "$ACTION" <<'PY'
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          action = sys.argv[2]
          entries = {}

          for raw_line in env_path.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in raw_line:
                  continue
              key, value = raw_line.split("=", 1)
              entries[key.strip()] = value.strip()

          required = {
              "POSTGRES_DB": entries.get("POSTGRES_DB", ""),
              "POSTGRES_USER": entries.get("POSTGRES_USER", ""),
              "POSTGRES_PASSWORD": entries.get("POSTGRES_PASSWORD", ""),
              "REDIS_PASSWORD": entries.get("REDIS_PASSWORD", ""),
          }

          missing = [key for key, value in required.items() if not value]
          if missing:
              raise SystemExit(f"Missing required backend runtime keys for managed services: {', '.join(missing)}")

          if action == "apply":
              placeholders = [
                  key for key, value in required.items()
                if value.startswith("change-me-")
              ]
              if placeholders:
                  raise SystemExit(
                      "Refusing to provision managed services with placeholder secrets. "
                      f"Update these keys first: {', '.join(placeholders)}"
                  )

          github_output = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              for key, value in {
                  "db_name": required["POSTGRES_DB"],
                  "db_username": required["POSTGRES_USER"],
                  "db_password": required["POSTGRES_PASSWORD"],
                  "redis_auth_token": required["REDIS_PASSWORD"],
              }.items():
                  handle.write(f"{key}<<EOF\n{value}\nEOF\n")
          PY

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="key=eks/${TF_VAR_cluster_name}.tfstate" \
            -backend-config="region=${TF_STATE_REGION}"

      - name: Recover orphaned sandbox Helm releases
        if: github.event.inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox'
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
        run: |
          if ! aws eks describe-cluster --region "$TF_VAR_aws_region" --name "$TF_VAR_cluster_name" >/dev/null 2>&1; then
            echo "Cluster $TF_VAR_cluster_name does not exist yet. Skipping orphaned Helm release cleanup."
            exit 0
          fi

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

          terraform state list > "$RUNNER_TEMP/terraform-state.txt"
          aws eks update-kubeconfig --region "$TF_VAR_aws_region" --name "$TF_VAR_cluster_name" --alias "$TF_VAR_cluster_name"

          while IFS='|' read -r state_address release_name release_namespace; do
            if grep -Fxq "$state_address" "$RUNNER_TEMP/terraform-state.txt"; then
              continue
            fi

            if helm status "$release_name" -n "$release_namespace" >/dev/null 2>&1; then
              echo "Uninstalling orphaned Helm release $release_name in namespace $release_namespace before Terraform apply."
              helm uninstall "$release_name" -n "$release_namespace"
            fi
          done <<'EOF'
          helm_release.argocd|argocd|argocd
          helm_release.metrics_server|metrics-server|kube-system
          helm_release.keda[0]|keda|keda
          helm_release.cluster_autoscaler[0]|cluster-autoscaler|kube-system
          EOF

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: terraform apply -auto-approve -input=false

      - name: Dump sandbox ArgoCD diagnostics on failure
        if: failure() && github.event.inputs.action == 'apply' && steps.context.outputs.deployment_environment == 'sandbox'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME" --alias "$CLUSTER_NAME"

          echo "===== helm status argocd ====="
          helm status argocd -n argocd || true

          echo "===== kubectl get pods -n argocd -o wide ====="
          kubectl get pods -n argocd -o wide || true

          echo "===== kubectl get events -n argocd ====="
          kubectl get events -n argocd --sort-by=.lastTimestamp || true

          echo "===== kubectl describe pods -n argocd ====="
          kubectl describe pods -n argocd || true

      - name: Show infrastructure outputs
        if: github.event.inputs.action == 'apply'
        working-directory: terraform/eks
        run: terraform output

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: terraform destroy -auto-approve -input=false
