name: Staging Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t face-detector-backend backend

      - name: Build frontend-admin image
        run: docker build -f frontend-admin/Dockerfile -t face-detector-admin frontend-admin

      - name: Build edge-client image
        run: docker build -f edge-client/Dockerfile -t face-detector-edge edge-client

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push staging images
        env:
          IMAGE_HOST: ${{ secrets.REGISTRY_HOST || 'ghcr.io' }}
          IMAGE_ORG: ${{ github.repository_owner }}
          SHA_TAG: ${{ github.sha }}
        run: |
          TAG=staging
          docker tag face-detector-backend ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-backend:${TAG}
          docker push ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-backend:${TAG}
          docker tag face-detector-backend ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-backend:${SHA_TAG}
          docker push ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-backend:${SHA_TAG}
          docker tag face-detector-admin ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-admin:${TAG}
          docker push ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-admin:${TAG}
          docker tag face-detector-admin ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-admin:${SHA_TAG}
          docker push ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-admin:${SHA_TAG}
          docker tag face-detector-edge ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-edge:${TAG}
          docker push ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-edge:${TAG}
          docker tag face-detector-edge ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-edge:${SHA_TAG}
          docker push ${IMAGE_HOST}/${IMAGE_ORG}/face-detector-edge:${SHA_TAG}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      - name: Install AWS CLI
        run: |
          python3 -m pip install --upgrade awscli

      - name: Generate staging .env from AWS SSM
        run: |
          chmod +x scripts/generate-env-from-ssm.sh
          export ENVIRONMENT=staging
          export OUTPUT_FILE=.env.staging
          export PARAM_PREFIX=/facedetector/staging
          bash scripts/generate-env-from-ssm.sh

      - name: Copy deploy files to VPS staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "nginx,docker-compose.ghcr.yml,scripts,.env.staging"
          target: "/home/ubuntu/face-detector-staging"

      - name: Execute staging deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/face-detector-staging
            cd /home/ubuntu/face-detector-staging
            chmod +x scripts/vps-deploy-ghcr.sh
            export GHCR_USERNAME="${{ secrets.VPS_GHCR_USERNAME }}"
            export GHCR_TOKEN="${{ secrets.VPS_GHCR_TOKEN }}"
            export REGISTRY_HOST="${{ secrets.REGISTRY_HOST || 'ghcr.io' }}"
            export REGISTRY_ORG="${{ github.repository_owner }}"
            export IMAGE_TAG="staging"
            export ENVIRONMENT="staging"
            export ENV_FILE=".env.staging"
            export TARGET_DIR="/home/ubuntu/face-detector-staging"
            bash scripts/vps-deploy-ghcr.sh
            bash scripts/vps-healthcheck.sh
