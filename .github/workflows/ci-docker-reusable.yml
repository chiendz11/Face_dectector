name: CI Docker Reusable

on:
  workflow_call:
    inputs:
      registry_org:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: docker-compose.ghcr.yml
      catalog_path:
        required: false
        type: string
        default: .github/image-catalog.json

jobs:
  docker-builds:
    name: docker-builds
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      # Keep matrix valid on PR runs where resolve-digests is skipped.
      digests_matrix: ${{ steps.resolve-digests.outputs.matrix || '[]' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ inputs.registry_org }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Python for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install integration test dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      # 芒鈥濃偓芒鈥濃偓 Build 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Build Docker images
        uses: ./.github/actions/build-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      # 芒鈥濃偓芒鈥濃偓 Integration smoke test 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Run compose-backed integration smoke test
        env:
          COMPOSE_FILE_PATH: ${{ inputs.compose_file }}
          REGISTRY_ORG: ${{ steps.image-meta.outputs.owner }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: bash scripts/ci-integration-test.sh

      # 芒鈥濃偓芒鈥濃偓 Security scan 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Trivy vulnerability scan
        if: github.event_name == 'push'
        uses: ./.github/actions/trivy-scan-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      # 芒鈥濃偓芒鈥濃偓 SBOM 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Generate SBOMs
        if: github.event_name == 'push'
        uses: ./.github/actions/sbom-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      # 芒鈥濃偓芒鈥濃偓 Publish 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_TOKEN != '' && (secrets.GHCR_USERNAME || github.repository_owner) || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Push Docker images
        if: github.event_name == 'push'
        env:
          IMAGE_HOST: ghcr.io/${{ steps.image-meta.outputs.owner }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CATALOG: ${{ inputs.catalog_path }}
        run: |
          while IFS= read -r row; do
            repo=$(echo "$row" | jq -r '.repository')
            docker push "$IMAGE_HOST/$repo:$IMAGE_TAG"
          done < <(jq -c '.[]' "$CATALOG")

      - name: Resolve published image digests
        if: github.event_name == 'push'
        id: resolve-digests
        env:
          OWNER: ${{ steps.image-meta.outputs.owner }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CATALOG: ${{ inputs.catalog_path }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          mkdir -p .artifacts
          MATRIX='[]'
          PUBLISHED_IMAGES='[]'
          SIGN_TARGETS='[]'

          while IFS= read -r row; do
            name=$(echo "$row" | jq -r '.name')
            repo=$(echo "$row" | jq -r '.repository')
            digest=$(python scripts/resolve_registry_digest.py \
              --repository "${OWNER}/${repo}" \
              --reference "$IMAGE_TAG" \
              --username "$REGISTRY_USERNAME" \
              --password "$REGISTRY_PASSWORD")
            subject="ghcr.io/${OWNER}/${repo}"
            ref="${subject}@${digest}"
            sbom=".artifacts/sbom/${name}.spdx.json"

            MATRIX=$(echo "$MATRIX" | jq -c \
              --arg s "$subject" --arg d "$digest" \
              '. + [{"subject_name": $s, "subject_digest": $d}]')
            PUBLISHED_IMAGES=$(echo "$PUBLISHED_IMAGES" | jq -c \
              --arg n "$name" --arg r "$subject" --arg t "$IMAGE_TAG" --arg d "$digest" \
              '. + [{"name": $n, "repository": $r, "tag": $t, "digest": $d}]')
            SIGN_TARGETS=$(echo "$SIGN_TARGETS" | jq -c \
              --arg ref "$ref" --arg sbom "$sbom" \
              '. + [{"ref": $ref, "sbom": $sbom}]')
          done < <(jq -c '.[]' "$CATALOG")

          echo "$SIGN_TARGETS" > .artifacts/sign-targets.json
          echo "{\"commit\": \"${IMAGE_TAG}\", \"images\": ${PUBLISHED_IMAGES}}" \
            > .artifacts/published-images.json
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      # 芒鈥濃偓芒鈥濃偓 Sign & attest 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign images and attach SBOM attestations
        if: github.event_name == 'push'
        uses: ./.github/actions/sign-images

      - name: Upload publish reports
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: published-oci-artifacts
          path: .artifacts
          if-no-files-found: error

  attest-provenance:
    name: attest-provenance
    if: github.event_name == 'push'
    needs: docker-builds
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.docker-builds.outputs.digests_matrix) }}
    steps:
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ matrix.image.subject_name }}
          subject-digest: ${{ matrix.image.subject_digest }}
          push-to-registry: true
