name: App CI

on:
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "docker-compose.yml"
      - "docker-compose.ci.yml"
      - ".trivyignore"
      - ".env.example"
      - "scripts/ci-e2e-test.sh"
      - ".github/image-catalog.json"
      - ".github/actions/build-images/**"
      - ".github/actions/trivy-scan-images/**"
      - ".github/actions/sbom-images/**"
      - ".github/actions/sign-images/**"
      - ".github/workflows/app-*.yml"
      - ".github/workflows/reusable-app-*.yml"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "docker-compose.yml"
      - "docker-compose.ci.yml"
      - ".trivyignore"
      - ".env.example"
      - "scripts/ci-e2e-test.sh"
      - ".github/image-catalog.json"
      - ".github/actions/build-images/**"
      - ".github/actions/trivy-scan-images/**"
      - ".github/actions/sbom-images/**"
      - ".github/actions/sign-images/**"
      - ".github/workflows/app-*.yml"
      - ".github/workflows/reusable-app-*.yml"

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write
  pull-requests: read
  statuses: write

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      registry_org: ${{ github.repository_owner }}
      image_tag: ${{ github.sha }}
    secrets: inherit

  release:
    if: github.event_name == 'push'
    needs: verify
    uses: ./.github/workflows/reusable-app-release.yml
    with:
      registry_org: ${{ github.repository_owner }}
      image_tag: ${{ github.sha }}
    secrets: inherit