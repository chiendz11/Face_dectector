name: Infra CI

on:
  pull_request:
    branches:
      - master
    paths:
      - "terraform/**"
      - "deploy/**"
      - "scripts/resolve_workflow_context.py"
      - ".github/workflows/infra-*.yml"
      - ".github/workflows/reusable-infra-*.yml"
      - ".github/workflows/infrastructure.yml"
      - ".github/workflows/app-cd.yml"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-plan-reusable.yml"
      - ".github/workflows/sandbox-*.yml"
  push:
    branches:
      - master
    paths:
      - "terraform/**"
      - "deploy/**"
      - "scripts/resolve_workflow_context.py"
      - ".github/workflows/infra-*.yml"
      - ".github/workflows/reusable-infra-*.yml"
      - ".github/workflows/infrastructure.yml"
      - ".github/workflows/app-cd.yml"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-plan-reusable.yml"
      - ".github/workflows/sandbox-*.yml"

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    uses: ./.github/workflows/reusable-infra-ci.yml