name: Terraform PR Plan Reusable

on:
  workflow_call:
    inputs:
      pull_request_number:
        required: true
        type: string
      source_ref_name:
        required: true
        type: string
      source_git_sha:
        required: true
        type: string
      owner_login:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number for the sandbox plan
        required: true
        default: ""
      source_ref_name:
        description: PR head branch to check out for the sandbox plan
        required: true
        default: ""
      source_git_sha:
        description: PR head commit SHA used for env_version
        required: true
        default: ""
      owner_login:
        description: Optional sandbox owner login used for cost-allocation tags
        required: false
        default: ""

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION || 'ap-southeast-1' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_ref_name }}

      - name: Load workflow repo defaults
        env:
          AWS_ROLE_SANDBOX_ARN_SECRET: ${{ secrets.AWS_ROLE_SANDBOX_ARN || '' }}
          AWS_ROLE_STAGING_ARN_SECRET: ${{ secrets.AWS_ROLE_STAGING_ARN || '' }}
          AWS_ROLE_PRODUCTION_ARN_SECRET: ${{ secrets.AWS_ROLE_PRODUCTION_ARN || '' }}
          REPO_VARS_JSON: ${{ toJson(vars) }}
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import os

          repo_vars = json.loads(os.environ.get("REPO_VARS_JSON") or "{}")

          def repo(name: str, default: str = "") -> str:
            value = repo_vars.get(name)
            if value in (None, ""):
              return default
            return str(value)

          def first_non_empty(*values: str, default: str = "") -> str:
            for value in values:
              if value not in (None, ""):
                return str(value)
            return default

          values = {
            "AWS_ROLE_SANDBOX_ARN": first_non_empty(
              os.environ.get("AWS_ROLE_SANDBOX_ARN_SECRET"),
              repo_vars.get("AWS_ROLE_SANDBOX_ARN"),
            ),
            "AWS_ROLE_STAGING_ARN": first_non_empty(
              os.environ.get("AWS_ROLE_STAGING_ARN_SECRET"),
              repo_vars.get("AWS_ROLE_STAGING_ARN"),
            ),
            "AWS_ROLE_PRODUCTION_ARN": first_non_empty(
              os.environ.get("AWS_ROLE_PRODUCTION_ARN_SECRET"),
              repo_vars.get("AWS_ROLE_PRODUCTION_ARN"),
            ),
            "STAGING_CLUSTER_NAME": repo("STAGING_EKS_CLUSTER_NAME", "face-detector-staging"),
            "PRODUCTION_CLUSTER_NAME": repo("PRODUCTION_EKS_CLUSTER_NAME", "face-detector-production"),
            "SANDBOX_CLUSTER_PREFIX": repo("SANDBOX_EKS_CLUSTER_PREFIX", "face-detector-sbx"),
            "STAGING_SNAPSHOT_BUCKET_NAME": repo("STAGING_SNAPSHOT_BUCKET_NAME", "face-detector-employee-images-staging"),
            "PRODUCTION_SNAPSHOT_BUCKET_NAME": repo("PRODUCTION_SNAPSHOT_BUCKET_NAME", "face-detector-employee-images-production"),
            "SANDBOX_SNAPSHOT_BUCKET_PREFIX": repo("SANDBOX_SNAPSHOT_BUCKET_PREFIX", "face-detector-sbx"),
            "STAGING_NODE_INSTANCE_TYPE": repo("STAGING_NODE_INSTANCE_TYPE", "c7i-flex.large"),
            "PRODUCTION_NODE_INSTANCE_TYPE": repo("PRODUCTION_NODE_INSTANCE_TYPE", "m7i-flex.large"),
            "SANDBOX_NODE_INSTANCE_TYPE": repo("SANDBOX_NODE_INSTANCE_TYPE", "c7i-flex.large"),
            "STAGING_NODE_MIN_SIZE": repo("STAGING_NODE_MIN_SIZE", "1"),
            "STAGING_NODE_MAX_SIZE": repo("STAGING_NODE_MAX_SIZE", "2"),
            "STAGING_NODE_DESIRED_SIZE": repo("STAGING_NODE_DESIRED_SIZE", "1"),
            "PRODUCTION_NODE_MIN_SIZE": repo("PRODUCTION_NODE_MIN_SIZE", "2"),
            "PRODUCTION_NODE_MAX_SIZE": repo("PRODUCTION_NODE_MAX_SIZE", "6"),
            "PRODUCTION_NODE_DESIRED_SIZE": repo("PRODUCTION_NODE_DESIRED_SIZE", "2"),
            "SANDBOX_NODE_MIN_SIZE": repo("SANDBOX_NODE_MIN_SIZE", "1"),
            "SANDBOX_NODE_MAX_SIZE": repo("SANDBOX_NODE_MAX_SIZE", "2"),
            "SANDBOX_NODE_DESIRED_SIZE": repo("SANDBOX_NODE_DESIRED_SIZE", "1"),
            "SSM_KMS_KEY_ID": repo("SSM_KMS_KEY_ID"),
          }

          for key, value in values.items():
            print(f"{key}={value}")
          PY

      - name: Resolve sandbox plan context
        id: context
        env:
          INPUT_PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          INPUT_OWNER_LOGIN: ${{ inputs.owner_login }}
          REF_NAME: ${{ inputs.source_ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_REPOSITORY_SLUG: ${{ github.repository }}
          GIT_SHA: ${{ inputs.source_git_sha }}
          RELEASE_TAG: ""
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/resolve_workflow_context.py \
            --mode plan \
            --environment sandbox \
            --action plan \
            --pull-request-number "$INPUT_PULL_REQUEST_NUMBER" \
            --owner-login "$INPUT_OWNER_LOGIN" \
            --ref-name "$REF_NAME" \
            --default-branch "$DEFAULT_BRANCH" \
            --repository-id "$REPOSITORY_ID" \
            --github-repository "$GITHUB_REPOSITORY_SLUG" \
            --github-token "$GITHUB_TOKEN" \
            --git-sha "$GIT_SHA" \
            --release-tag "$RELEASE_TAG" \
            --staging-cluster-name "$STAGING_CLUSTER_NAME" \
            --production-cluster-name "$PRODUCTION_CLUSTER_NAME" \
            --sandbox-cluster-prefix "$SANDBOX_CLUSTER_PREFIX" \
            --staging-snapshot-bucket-name "$STAGING_SNAPSHOT_BUCKET_NAME" \
            --production-snapshot-bucket-name "$PRODUCTION_SNAPSHOT_BUCKET_NAME" \
            --sandbox-snapshot-bucket-prefix "$SANDBOX_SNAPSHOT_BUCKET_PREFIX" \
            --staging-node-instance-type "$STAGING_NODE_INSTANCE_TYPE" \
            --production-node-instance-type "$PRODUCTION_NODE_INSTANCE_TYPE" \
            --sandbox-node-instance-type "$SANDBOX_NODE_INSTANCE_TYPE" \
            --staging-node-min-size "$STAGING_NODE_MIN_SIZE" \
            --staging-node-max-size "$STAGING_NODE_MAX_SIZE" \
            --staging-node-desired-size "$STAGING_NODE_DESIRED_SIZE" \
            --production-node-min-size "$PRODUCTION_NODE_MIN_SIZE" \
            --production-node-max-size "$PRODUCTION_NODE_MAX_SIZE" \
            --production-node-desired-size "$PRODUCTION_NODE_DESIRED_SIZE" \
            --sandbox-node-min-size "$SANDBOX_NODE_MIN_SIZE" \
            --sandbox-node-max-size "$SANDBOX_NODE_MAX_SIZE" \
            --sandbox-node-desired-size "$SANDBOX_NODE_DESIRED_SIZE" \
            --role-sandbox-arn "$AWS_ROLE_SANDBOX_ARN" \
            --role-staging-arn "$AWS_ROLE_STAGING_ARN" \
            --role-production-arn "$AWS_ROLE_PRODUCTION_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ steps.context.outputs.aws_role_arn }}
          role-session-name: gha-pr-plan-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.6.6"

      - name: Materialize backend runtime env file
        id: runtime-env
        env:
          SANDBOX_BACKEND_ENV_FILE: ${{ secrets['SANDBOX_BACKEND_ENV_FILE'] }}
          STAGING_BACKEND_ENV_FILE: ${{ secrets.STAGING_BACKEND_ENV_FILE }}
        run: |
          TEMPLATE_PATH="$GITHUB_WORKSPACE/deploy/runtime/backend.staging.env.example"
          OUTPUT_PATH="$RUNNER_TEMP/backend-runtime.sandbox.env"

          if [ -n "$SANDBOX_BACKEND_ENV_FILE" ]; then
            ENV_CONTENT="$SANDBOX_BACKEND_ENV_FILE"
          else
            ENV_CONTENT="$STAGING_BACKEND_ENV_FILE"
          fi

          if [ -n "$ENV_CONTENT" ]; then
            printf '%s\n' "$ENV_CONTENT" > "$OUTPUT_PATH"
          else
            cat "$TEMPLATE_PATH" > "$OUTPUT_PATH"
          fi

          echo "env_file_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Extract managed service credentials
        id: runtime-contract
        env:
          ENV_FILE_PATH: ${{ steps.runtime-env.outputs.env_file_path }}
        run: |
          python3 - "$ENV_FILE_PATH" <<'PY'
          import os
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          entries = {}

          for raw_line in env_path.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in raw_line:
                  continue
              key, value = raw_line.split("=", 1)
              entries[key.strip()] = value.strip()

          required = {
              "POSTGRES_DB": entries.get("POSTGRES_DB", ""),
              "POSTGRES_USER": entries.get("POSTGRES_USER", ""),
              "POSTGRES_PASSWORD": entries.get("POSTGRES_PASSWORD", ""),
              "REDIS_PASSWORD": entries.get("REDIS_PASSWORD", ""),
          }

          missing = [key for key, value in required.items() if not value]
          if missing:
              raise SystemExit(f"Missing required backend runtime keys: {', '.join(missing)}")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              for key, value in {
                  "db_name": required["POSTGRES_DB"],
                  "db_username": required["POSTGRES_USER"],
                  "db_password": required["POSTGRES_PASSWORD"],
                  "redis_auth_token": required["REDIS_PASSWORD"],
              }.items():
                  handle.write(f"{key}<<EOF\n{value}\nEOF\n")
          PY

      - name: Terraform plan for EKS sandbox
        id: eks-plan
        working-directory: terraform/eks
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_deployment_environment: ${{ steps.context.outputs.deployment_environment }}
          TF_VAR_cluster_name: ${{ steps.context.outputs.cluster_name }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_snapshot_bucket_name: ${{ steps.context.outputs.snapshot_bucket_name }}
          TF_VAR_node_instance_type: ${{ steps.context.outputs.node_instance_type }}
          TF_VAR_node_min_size: ${{ steps.context.outputs.node_min_size }}
          TF_VAR_node_max_size: ${{ steps.context.outputs.node_max_size }}
          TF_VAR_node_desired_size: ${{ steps.context.outputs.node_desired_size }}
          TF_VAR_db_name: ${{ steps.runtime-contract.outputs.db_name }}
          TF_VAR_db_username: ${{ steps.runtime-contract.outputs.db_username }}
          TF_VAR_db_password: ${{ steps.runtime-contract.outputs.db_password }}
          TF_VAR_redis_auth_token: ${{ steps.runtime-contract.outputs.redis_auth_token }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="key=${{ steps.context.outputs.terraform_state_key }}" \
            -backend-config="region=${TF_STATE_REGION}"

          set +e
          terraform plan -input=false -lock=false -detailed-exitcode -no-color > "$RUNNER_TEMP/eks-plan.txt" 2>&1
          exit_code=$?
          set -e

          cat "$RUNNER_TEMP/eks-plan.txt"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Terraform plan for sandbox SSM path
        id: ssm-plan
        working-directory: terraform/ssm
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
          TF_VAR_environment: ${{ steps.context.outputs.ssm_environment_key }}
          TF_VAR_environment_identity: ${{ steps.context.outputs.environment_identity }}
          TF_VAR_env_version: ${{ steps.context.outputs.env_version }}
          TF_VAR_resource_owner: ${{ steps.context.outputs.owner_login }}
          TF_VAR_env_file_path: ${{ steps.runtime-env.outputs.env_file_path }}
        run: |
          export TF_VAR_kms_key_id="${SSM_KMS_KEY_ID:-}"
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="key=${{ steps.context.outputs.ssm_state_key }}" \
            -backend-config="region=${TF_STATE_REGION}"

          set +e
          terraform plan -input=false -lock=false -detailed-exitcode -no-color > "$RUNNER_TEMP/ssm-plan.txt" 2>&1
          exit_code=$?
          set -e

          cat "$RUNNER_TEMP/ssm-plan.txt"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Build PR plan comment
        env:
          PR_NUMBER: ${{ inputs.pull_request_number }}
          HEAD_REF: ${{ inputs.source_ref_name }}
          SANDBOX_KEY: ${{ steps.context.outputs.sandbox_key }}
          ENV_VERSION: ${{ steps.context.outputs.env_version }}
          CLUSTER_NAME: ${{ steps.context.outputs.cluster_name }}
          TERRAFORM_STATE_KEY: ${{ steps.context.outputs.terraform_state_key }}
          SSM_STATE_KEY: ${{ steps.context.outputs.ssm_state_key }}
          SNAPSHOT_BUCKET_NAME: ${{ steps.context.outputs.snapshot_bucket_name }}
          SSM_ENVIRONMENT_KEY: ${{ steps.context.outputs.ssm_environment_key }}
          EKS_EXIT_CODE: ${{ steps.eks-plan.outputs.exit_code }}
          SSM_EXIT_CODE: ${{ steps.ssm-plan.outputs.exit_code }}
        run: |
          python3 - "$RUNNER_TEMP/eks-plan.txt" "$RUNNER_TEMP/ssm-plan.txt" > "$RUNNER_TEMP/terraform-plan-comment.md" <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          eks_plan = Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
          ssm_plan = Path(sys.argv[2]).read_text(encoding="utf-8", errors="replace")

          def summarize(exit_code: str, content: str) -> tuple[str, str]:
              summary_match = re.search(r"Plan:\s+\d+ to add, \d+ to change, \d+ to destroy\.", content)
              if exit_code == "0":
                  status = "no changes"
              elif exit_code == "2":
                  status = summary_match.group(0) if summary_match else "changes detected"
              else:
                  status = "plan failed"
              excerpt = "\n".join(content.splitlines()[:200]).strip()
              if not excerpt:
                  excerpt = "No output captured."
              return status, excerpt

          eks_status, eks_excerpt = summarize(os.environ["EKS_EXIT_CODE"], eks_plan)
          ssm_status, ssm_excerpt = summarize(os.environ["SSM_EXIT_CODE"], ssm_plan)

          print("<!-- terraform-pr-plan -->")
          print("## Terraform PR Plan")
          print("")
          print(f"- PR: #{os.environ['PR_NUMBER']}")
          print(f"- Sandbox key: `{os.environ['SANDBOX_KEY']}`")
          print(f"- Environment version: `{os.environ['ENV_VERSION']}`")
          print(f"- Feature branch: `{os.environ['HEAD_REF']}`")
          print(f"- Sandbox cluster: `{os.environ['CLUSTER_NAME']}`")
          print(f"- Sandbox Terraform state: `{os.environ['TERRAFORM_STATE_KEY']}`")
          print(f"- Sandbox SSM state: `{os.environ['SSM_STATE_KEY']}`")
          print(f"- Sandbox snapshot bucket: `{os.environ['SNAPSHOT_BUCKET_NAME']}`")
          print(f"- Sandbox SSM path key: `{os.environ['SSM_ENVIRONMENT_KEY']}`")
          print(f"- EKS plan: {eks_status}")
          print(f"- SSM plan: {ssm_status}")
          print("")
          print("<details><summary>EKS plan excerpt</summary>")
          print("")
          print("```terraform")
          print(eks_excerpt)
          print("```")
          print("</details>")
          print("")
          print("<details><summary>SSM plan excerpt</summary>")
          print("")
          print("```terraform")
          print(ssm_excerpt)
          print("```")
          print("</details>")
          PY

      - name: Publish PR plan comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          COMMENT_FILE: ${{ runner.temp }}/terraform-plan-comment.md
          PR_NUMBER: ${{ inputs.pull_request_number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = '<!-- terraform-pr-plan -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Fail when a plan step fails
        env:
          EKS_EXIT_CODE: ${{ steps.eks-plan.outputs.exit_code }}
          SSM_EXIT_CODE: ${{ steps.ssm-plan.outputs.exit_code }}
        run: |
          if [ "$EKS_EXIT_CODE" = "1" ] || [ "$SSM_EXIT_CODE" = "1" ]; then
            echo "One or more terraform plan steps failed." >&2
            exit 1
          fi