name: GitOps Staging Promotion

on:
  workflow_run:
    workflows:
      - CI Pipeline
    types:
      - completed

concurrency:
  group: gitops-staging-promotion
  cancel-in-progress: true

jobs:
  promote:
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Skip stale promotion
        id: branch-head
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$CURRENT_SHA" != "$EXPECTED_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Branch head moved to $CURRENT_SHA. Skipping stale promotion for $EXPECTED_SHA."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.branch-head.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        if: steps.branch-head.outputs.skip != 'true'
        run: python -m pip install pyyaml

      - name: Update staging image tags
        if: steps.branch-head.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          python - <<'PY'
import os
from pathlib import Path

import yaml

path = Path('deploy/helm/face-detector/values-staging.yaml')
data = yaml.safe_load(path.read_text(encoding='utf-8')) or {}
for component in ('backend', 'worker', 'frontendAdmin'):
    data.setdefault(component, {}).setdefault('image', {})['tag'] = os.environ['IMAGE_TAG']
path.write_text(yaml.safe_dump(data, sort_keys=False), encoding='utf-8')
PY

      - name: Commit staging promotion
        if: steps.branch-head.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if git diff --quiet -- deploy/helm/face-detector/values-staging.yaml; then
            echo "Staging values already point to $IMAGE_TAG."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/face-detector/values-staging.yaml
          git commit -m "gitops: promote staging ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:${TARGET_BRANCH}