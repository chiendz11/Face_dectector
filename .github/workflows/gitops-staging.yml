name: GitOps Staging Promotion

on:
  workflow_run:
    workflows:
      - CI Pipeline
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: gitops-staging-promotion
  cancel-in-progress: true

jobs:
  promote:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: read
    steps:
      - name: Checkout branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Skip stale promotion
        id: branch-head
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$CURRENT_SHA" != "$EXPECTED_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Branch head moved to $CURRENT_SHA. Skipping stale promotion for $EXPECTED_SHA."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.branch-head.outputs.skip != 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        if: steps.branch-head.outputs.skip != 'true'
        run: python -m pip install pyyaml

      - name: Resolve published image digests
        if: steps.branch-head.outputs.skip != 'true'
        id: image-digests
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          REGISTRY_USERNAME: ${{ secrets.GHCR_TOKEN != '' && (secrets.GHCR_USERNAME || github.repository_owner) || github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          BACKEND_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-backend" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          FRONTEND_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-admin" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          ENROLLMENT_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-enrollment" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          NGINX_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-nginx" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          {
            echo "backend_digest=$BACKEND_DIGEST"
            echo "frontend_digest=$FRONTEND_DIGEST"
            echo "enrollment_digest=$ENROLLMENT_DIGEST"
            echo "nginx_digest=$NGINX_DIGEST"
          } >> "$GITHUB_OUTPUT"

      - name: Update staging image digests
        if: steps.branch-head.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          python scripts/update_gitops_image_locks.py \
            --values-file deploy/helm/face-detector/values-staging.yaml \
            --image-tag "$IMAGE_TAG" \
            --backend-digest "${{ steps.image-digests.outputs.backend_digest }}" \
            --frontend-digest "${{ steps.image-digests.outputs.frontend_digest }}" \
            --enrollment-digest "${{ steps.image-digests.outputs.enrollment_digest }}" \
            --nginx-digest "${{ steps.image-digests.outputs.nginx_digest }}"

      - name: Commit staging promotion
        if: steps.branch-head.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if git diff --quiet -- deploy/helm/face-detector/values-staging.yaml; then
            echo "Staging values already point to $IMAGE_TAG."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/face-detector/values-staging.yaml
          git commit -m "gitops: promote staging ${IMAGE_TAG} [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"
