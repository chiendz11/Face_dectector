name: CI Pipeline

on:
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"

jobs:
  docker:
    uses: ./.github/workflows/ci-docker-reusable.yml
    with:
      registry_org: ${{ github.repository_owner }}
      image_tag: ${{ github.sha }}
    secrets: inherit