name: CI

on:
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"

jobs:
  validation:
    uses: ./.github/workflows/ci-validation-reusable.yml
    secrets: inherit

  docker-builds:
    needs: validation
    uses: ./.github/workflows/ci-docker-reusable.yml
    with:
      run_publish: ${{ github.event_name == 'push' }}
      registry_org: ${{ github.repository_owner }}
      image_tag: ${{ github.sha }}
      compose_file: docker-compose.ghcr.yml
      catalog_path: .github/image-catalog.json
    secrets: inherit

  # ── Stable status gate ─────────────────────────────────────────────────────
  # Branch-protection rules should require only this one check: "CI / ci-status".
  # Adding new jobs or renaming workflow files won't break the protection rule.
  ci-status:
    name: ci-status
    if: always()
    needs: [validation, docker-builds]
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed
        run: |
          validation="${{ needs.validation.result }}"
          docker="${{ needs.docker-builds.result }}"
          echo "validation: $validation"
          echo "docker-builds: $docker"
          # 'skipped' counts as passing (e.g. docker-builds on PR when run_publish=false)
          for result in "$validation" "$docker"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Required job failed with result: $result"
              exit 1
            fi
          done
          echo "All required jobs passed."
