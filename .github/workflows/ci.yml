# Re-run after merge to verify full pipeline
name: CI Pipeline

on:
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".env.production.example"
      - ".github/workflows/**"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run backend lint
        run: ruff check app tests

  security-scan:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run backend dependency audit
        run: |
          # Temporary allowlist for known vulnerabilities in pinned dependencies.
          # Keep this list short and remove entries as dependencies are upgraded.
          pip-audit -r backend/requirements.txt --progress=off \
            --ignore-vuln CVE-2026-24486 \
            --ignore-vuln CVE-2026-40347 \
            --ignore-vuln PYSEC-2023-184 \
            --ignore-vuln GHSA-jh2j-j4j9-crg3 \
            --ignore-vuln CVE-2026-30922 \
            --ignore-vuln CVE-2025-62727

      - name: Run edge-client dependency audit
        run: pip-audit -r edge-client/requirements.txt --progress=off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies for audit
        run: |
          cd frontend-admin
          npm ci

      - name: Run frontend dependency audit
        run: |
          cd frontend-admin
          npm audit --audit-level=high

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: security-scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend tests
        run: pytest

  frontend-admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-admin/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend admin
        run: npm run build

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t face-detector-backend backend

      - name: Build frontend-admin image
        run: docker build -f frontend-admin/Dockerfile -t face-detector-admin frontend-admin

      - name: Build edge-client image
        run: docker build -f edge-client/Dockerfile -t face-detector-edge edge-client
