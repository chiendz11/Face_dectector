# Re-run after merge to verify full pipeline
name: CI Pipeline

on:
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run backend lint
        run: ruff check app tests

  platform-validate:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init for SSM
        working-directory: terraform/ssm
        run: terraform init -backend=false -input=false

      - name: Terraform validate for SSM
        working-directory: terraform/ssm
        run: terraform validate

      - name: Terraform init for EKS
        working-directory: terraform/eks
        run: terraform init -backend=false -input=false

      - name: Terraform validate for EKS
        working-directory: terraform/eks
        run: terraform validate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint Helm chart
        run: helm lint deploy/helm/face-detector

  security-scan:
    runs-on: ubuntu-latest
    needs: platform-validate
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit and pip-audit
        run: pip install bandit pip-audit

      - name: Run Python SAST scan
        run: bandit -r backend/app -q

      - name: Run backend dependency audit
        run: |
          # Temporary allowlist for known vulnerabilities in pinned dependencies.
          # Keep this list short and remove entries as dependencies are upgraded.
          pip-audit -r backend/requirements.txt --progress=off \
            --ignore-vuln CVE-2026-24486 \
            --ignore-vuln CVE-2026-40347 \
            --ignore-vuln PYSEC-2023-184 \
            --ignore-vuln GHSA-jh2j-j4j9-crg3 \
            --ignore-vuln CVE-2026-30922 \
            --ignore-vuln CVE-2025-62727

      - name: Run edge-client dependency audit
        run: pip-audit -r edge-client/requirements.txt --progress=off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies for audit
        run: |
          cd frontend-admin
          npm ci

      - name: Run frontend dependency audit
        run: |
          cd frontend-admin
          npm audit --audit-level=high

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: security-scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend tests
        run: pytest

  frontend-admin-build:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-admin/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend admin
        run: npm run build

  edge-client-tests:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: edge-client
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "edge-client/requirements-ci.txt"

      - name: Install edge-client CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run edge-client tests
        run: pytest tests

  docker-builds:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-admin-build
      - edge-client-tests
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Python for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install integration test dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Build Docker images once
        env:
          BACKEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend:${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin:${{ github.sha }}
          EDGE_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge:${{ github.sha }}
          NGINX_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-nginx:${{ github.sha }}
        run: |
          docker buildx build --load -t "$BACKEND_IMAGE" -f backend/Dockerfile backend
          docker buildx build --load -t "$FRONTEND_IMAGE" -f frontend-admin/Dockerfile frontend-admin
          docker buildx build --load -t "$EDGE_IMAGE" -f edge-client/Dockerfile edge-client
          docker buildx build --load -t "$NGINX_IMAGE" -f nginx/Dockerfile nginx

      - name: Run compose-backed integration smoke test against built images
        env:
          COMPOSE_FILE_PATH: docker-compose.ghcr.yml
          REGISTRY_ORG: ${{ steps.image-meta.outputs.owner }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/ci-integration-test.sh

      - name: Scan built images with Trivy
        if: github.event_name == 'push'
        env:
          BACKEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend:${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin:${{ github.sha }}
          EDGE_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge:${{ github.sha }}
          NGINX_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-nginx:${{ github.sha }}
        run: |
          mkdir -p .artifacts/trivy
          for item in \
            "backend|$BACKEND_IMAGE" \
            "frontend-admin|$FRONTEND_IMAGE" \
            "edge-client|$EDGE_IMAGE" \
            "nginx|$NGINX_IMAGE"; do
            NAME="${item%%|*}"
            IMAGE_REF="${item#*|}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "${PWD}/.artifacts/trivy:/reports" \
              aquasec/trivy:0.53.0 image \
              --scanners vuln \
              --ignore-unfixed \
              --severity HIGH,CRITICAL \
              --format sarif \
              --output "/reports/${NAME}.sarif" \
              --exit-code 1 \
              "$IMAGE_REF"
          done

      - name: Generate SBOMs for published images
        if: github.event_name == 'push'
        env:
          BACKEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend:${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin:${{ github.sha }}
          EDGE_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge:${{ github.sha }}
          NGINX_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-nginx:${{ github.sha }}
        run: |
          mkdir -p .artifacts/sbom
          for item in \
            "backend|$BACKEND_IMAGE" \
            "frontend-admin|$FRONTEND_IMAGE" \
            "edge-client|$EDGE_IMAGE" \
            "nginx|$NGINX_IMAGE"; do
            NAME="${item%%|*}"
            IMAGE_REF="${item#*|}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "${PWD}/.artifacts/sbom:/sbom" \
              anchore/syft:v1.8.0 \
              "$IMAGE_REF" \
              -o "spdx-json=/sbom/${NAME}.spdx.json"
          done

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_TOKEN != '' && (secrets.GHCR_USERNAME || github.repository_owner) || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Push Docker images
        if: github.event_name == 'push'
        env:
          BACKEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend:${{ github.sha }}
          FRONTEND_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin:${{ github.sha }}
          EDGE_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge:${{ github.sha }}
          NGINX_IMAGE: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-nginx:${{ github.sha }}
        run: |
          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"
          docker push "$EDGE_IMAGE"
          docker push "$NGINX_IMAGE"

      - name: Resolve published image digests
        if: github.event_name == 'push'
        id: image-digests
        env:
          OWNER: ${{ steps.image-meta.outputs.owner }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          mkdir -p .artifacts
          BACKEND_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-backend" --reference "${GITHUB_SHA}" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          FRONTEND_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-admin" --reference "${GITHUB_SHA}" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          EDGE_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-edge" --reference "${GITHUB_SHA}" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          NGINX_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-nginx" --reference "${GITHUB_SHA}" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")

          echo "backend_digest=$BACKEND_DIGEST" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=$FRONTEND_DIGEST" >> "$GITHUB_OUTPUT"
          echo "edge_digest=$EDGE_DIGEST" >> "$GITHUB_OUTPUT"
          echo "nginx_digest=$NGINX_DIGEST" >> "$GITHUB_OUTPUT"

          cat > .artifacts/published-images.json <<EOF
          {
            "commit": "${GITHUB_SHA}",
            "images": {
              "backend": {
                "repository": "ghcr.io/${OWNER}/face-detector-backend",
                "tag": "${GITHUB_SHA}",
                "digest": "${BACKEND_DIGEST}"
              },
              "frontend_admin": {
                "repository": "ghcr.io/${OWNER}/face-detector-admin",
                "tag": "${GITHUB_SHA}",
                "digest": "${FRONTEND_DIGEST}"
              },
              "edge_client": {
                "repository": "ghcr.io/${OWNER}/face-detector-edge",
                "tag": "${GITHUB_SHA}",
                "digest": "${EDGE_DIGEST}"
              },
              "nginx": {
                "repository": "ghcr.io/${OWNER}/face-detector-nginx",
                "tag": "${GITHUB_SHA}",
                "digest": "${NGINX_DIGEST}"
              }
            }
          }
          EOF

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign images and attach SBOM attestations
        if: github.event_name == 'push'
        env:
          BACKEND_REF: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend@${{ steps.image-digests.outputs.backend_digest }}
          FRONTEND_REF: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin@${{ steps.image-digests.outputs.frontend_digest }}
          EDGE_REF: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge@${{ steps.image-digests.outputs.edge_digest }}
          NGINX_REF: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-nginx@${{ steps.image-digests.outputs.nginx_digest }}
        run: |
          for item in \
            "backend|$BACKEND_REF|.artifacts/sbom/backend.spdx.json" \
            "frontend-admin|$FRONTEND_REF|.artifacts/sbom/frontend-admin.spdx.json" \
            "edge-client|$EDGE_REF|.artifacts/sbom/edge-client.spdx.json" \
            "nginx|$NGINX_REF|.artifacts/sbom/nginx.spdx.json"; do
            IMAGE_REF=$(echo "$item" | cut -d'|' -f2)
            SBOM_PATH=$(echo "$item" | cut -d'|' -f3)
            cosign sign --yes "$IMAGE_REF"
            cosign attest --yes --type spdxjson --predicate "$SBOM_PATH" "$IMAGE_REF"
          done

      - name: Attest backend provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend
          subject-digest: ${{ steps.image-digests.outputs.backend_digest }}
          push-to-registry: true

      - name: Attest frontend-admin provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin
          subject-digest: ${{ steps.image-digests.outputs.frontend_digest }}
          push-to-registry: true

      - name: Attest edge-client provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge
          subject-digest: ${{ steps.image-digests.outputs.edge_digest }}
          push-to-registry: true

      - name: Attest nginx provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-nginx
          subject-digest: ${{ steps.image-digests.outputs.nginx_digest }}
          push-to-registry: true

      - name: Upload publish reports
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: published-oci-artifacts
          path: .artifacts
          if-no-files-found: error
