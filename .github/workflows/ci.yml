name: CI Pipeline

on:
  pull_request:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"

jobs:
  validation:
    uses: ./.github/workflows/ci-minimal-test.yml