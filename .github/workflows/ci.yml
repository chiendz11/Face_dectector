# Re-run after merge to verify full pipeline
name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "deploy/**"
      - "frontend-admin/**"
      - "edge-client/**"
      - "nginx/**"
      - "scripts/**"
      - "terraform/**"
      - "docker-compose.yml"
      - "docker-compose.ghcr.yml"
      - ".env.example"
      - ".github/workflows/**"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run backend lint
        run: ruff check app tests

  platform-validate:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init for SSM
        working-directory: terraform/ssm
        run: terraform init -backend=false -input=false

      - name: Terraform validate for SSM
        working-directory: terraform/ssm
        run: terraform validate

      - name: Terraform init for EKS
        working-directory: terraform/eks
        run: terraform init -backend=false -input=false

      - name: Terraform validate for EKS
        working-directory: terraform/eks
        run: terraform validate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint Helm chart
        run: helm lint deploy/helm/face-detector

  security-scan:
    runs-on: ubuntu-latest
    needs: platform-validate
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit and pip-audit
        run: pip install bandit pip-audit

      - name: Run Python SAST scan
        run: bandit -r backend/app -q

      - name: Run Python dependency audit
        run: pip-audit -r backend/requirements.txt --progress=off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies for audit
        run: |
          cd frontend-admin
          npm ci

      - name: Run frontend dependency audit
        run: |
          cd frontend-admin
          npm audit --audit-level=high

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: security-scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend tests
        run: pytest

  frontend-admin-build:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-admin/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend admin
        run: npm run build

  docker-builds:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-admin-build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-backend:${{ github.sha }}

      - name: Build and optionally push frontend-admin image
        uses: docker/build-push-action@v6
        with:
          context: frontend-admin
          file: frontend-admin/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-admin:${{ github.sha }}

      - name: Build and optionally push edge-client image
        uses: docker/build-push-action@v6
        with:
          context: edge-client
          file: edge-client/Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ghcr.io/${{ steps.image-meta.outputs.owner }}/face-detector-edge:${{ github.sha }}

  integration-tests:
    runs-on: ubuntu-latest
    needs:
      - docker-builds
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Docker Compose integration smoke test
        run: |
          chmod +x scripts/ci-integration-test.sh
          bash scripts/ci-integration-test.sh
