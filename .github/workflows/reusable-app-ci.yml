name: Reusable App CI

on:
  workflow_call:
    inputs:
      registry_org:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: docker-compose.ci.yml
      catalog_path:
        required: false
        type: string
        default: .github/image-catalog.json

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install ruff
        run: pip install ruff==0.15.10

      - name: Run backend lint
        run: ruff check app tests

  app-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend-lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit and pip-audit
        run: pip install bandit pip-audit

      - name: Run Python SAST scan
        run: bandit -r backend/app -q

      - name: Run backend dependency audit
        run: |
          pip-audit -r backend/requirements.txt --progress=off \
            --ignore-vuln CVE-2026-24486 \
            --ignore-vuln CVE-2026-40347 \
            --ignore-vuln PYSEC-2023-184 \
            --ignore-vuln GHSA-jh2j-j4j9-crg3 \
            --ignore-vuln CVE-2026-30922 \
            --ignore-vuln CVE-2025-62727

      - name: Run edge-client dependency audit
        run: pip-audit -r edge-client/requirements.txt --progress=off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies for audit
        run: |
          cd frontend-admin
          npm ci

      - name: Run frontend dependency audit
        run: |
          cd frontend-admin
          npm audit --audit-level=high

  backend-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: app-security-scan
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend unit tests
        run: pytest -m "not e2e and not integration" --tb=short -q --cov=app --cov-report=xml:coverage-unit.xml --cov-report=term-missing

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage-unit.xml
          if-no-files-found: error

  backend-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: app-security-scan
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend integration tests
        run: pytest -m integration --tb=short -q --cov=app --cov-report=xml:coverage-integration.xml --cov-report=term-missing

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: backend/coverage-integration.xml
          if-no-files-found: error

  frontend-admin-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: app-security-scan
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-admin/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend admin
        run: npm run build

  edge-client-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: app-security-scan
    defaults:
      run:
        working-directory: edge-client
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "edge-client/requirements-ci.txt"

      - name: Install edge-client CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run edge-client tests
        run: python -m pytest tests

  docker-image-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: app-security-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ inputs.registry_org }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build Docker images
        uses: ./.github/actions/build-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Save built Docker images
        uses: ./.github/actions/save-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Generate SBOMs
        uses: ./.github/actions/sbom-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Trivy vulnerability scan
        uses: ./.github/actions/trivy-scan-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Upload Trivy SARIF to code scanning
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .artifacts/trivy
          category: app-container-images

      - name: Upload Trivy reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: .artifacts/trivy
          if-no-files-found: warn

      - name: Upload SBOM reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: .artifacts/sbom
          if-no-files-found: warn

      - name: Upload built image archives
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-archives
          path: .artifacts/images
          if-no-files-found: warn

  docker-smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - backend-unit-tests
      - backend-integration-tests
      - docker-image-verify
      - frontend-admin-build
      - edge-client-tests
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download built image archives
        uses: actions/download-artifact@v4
        with:
          name: docker-image-archives
          path: .artifacts/images

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ inputs.registry_org }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Load previously built Docker images
        uses: ./.github/actions/load-images
        with:
          catalog_path: ${{ inputs.catalog_path }}

      - name: Set up Python for e2e smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install e2e smoke test dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Run compose-backed e2e smoke test
        env:
          COMPOSE_FILE_PATH: ${{ inputs.compose_file }}
          REGISTRY_ORG: ${{ steps.image-meta.outputs.owner }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: bash scripts/ci-e2e-test.sh