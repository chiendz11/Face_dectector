name: Reusable App CI

on:
  workflow_call:
    inputs:
      registry_org:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: docker-compose.ci.yml
      catalog_path:
        required: false
        type: string
        default: .github/image-catalog.json

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install ruff
        run: pip install ruff==0.15.10

      - name: Run backend lint
        run: ruff check app tests

  app-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-lint
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Bandit and pip-audit
        run: pip install bandit==1.8.5 pip-audit==2.9.0

      - name: Run Python SAST scan
        run: bandit -r backend/app -q

      - name: Build pip-audit ignore args from policy file
        id: audit-ignore
        run: |
          IGNORE_ARGS=$(grep -v '^#' policies/pip-audit-ignore.txt | grep -v '^[[:space:]]*$' | awk '{print "--ignore-vuln", $1}' | tr '\n' ' ')
          echo "args=${IGNORE_ARGS}" >> "$GITHUB_OUTPUT"

      - name: Run backend dependency audit
        run: pip-audit -r backend/requirements.txt --progress=off ${{ steps.audit-ignore.outputs.args }}

      - name: Run edge-client dependency audit
        run: pip-audit -r edge-client/requirements.txt --progress=off ${{ steps.audit-ignore.outputs.args }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install frontend dependencies for audit
        run: |
          cd frontend-admin
          npm ci

      - name: Run frontend dependency audit
        run: |
          cd frontend-admin
          npm audit --audit-level=high

      - name: Generate backend dependency license inventory
        run: |
          mkdir -p .artifacts/license-checks .artifacts/licenses
          python -m venv .artifacts/license-checks/backend
          .artifacts/license-checks/backend/bin/python -m pip install pip-licenses==5.5.5 -r backend/requirements.txt
          .artifacts/license-checks/backend/bin/python -m piplicenses --format=json > .artifacts/licenses/backend.json

      - name: Generate edge-client dependency license inventory
        run: |
          mkdir -p .artifacts/license-checks .artifacts/licenses
          python -m venv .artifacts/license-checks/edge-client
          .artifacts/license-checks/edge-client/bin/python -m pip install pip-licenses==5.5.5 -r edge-client/requirements.txt
          .artifacts/license-checks/edge-client/bin/python -m piplicenses --format=json > .artifacts/licenses/edge-client.json

      - name: Generate frontend dependency license inventory
        run: |
          cd frontend-admin
          npx --yes license-checker-rseidelsohn@4.4.2 --json > ../.artifacts/licenses/frontend-admin.json

      - name: Evaluate dependency license policy
        run: |
          python scripts/check_dependency_licenses.py \
            --policy policies/licenses/policy.json \
            --inventory backend:pip:.artifacts/licenses/backend.json \
            --inventory edge-client:pip:.artifacts/licenses/edge-client.json \
            --inventory frontend-admin:node:.artifacts/licenses/frontend-admin.json \
            --report-path .artifacts/licenses/report.json

      - name: Upload dependency license report
        if: ${{ always() && hashFiles('.artifacts/licenses/*.json') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-license-report
          path: .artifacts/licenses
          if-no-files-found: error
          retention-days: 30

  backend-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend unit tests
        run: pytest -m "not e2e and not integration" --tb=short -q --cov=app --cov-report=xml:coverage-unit.xml --cov-report=term-missing

      - name: Upload unit test coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: backend/coverage-unit.xml
          if-no-files-found: error
          retention-days: 30

  backend-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend integration tests
        run: pytest -m integration --tb=short -q --cov=app --cov-report=xml:coverage-integration.xml --cov-report=term-missing

      - name: Upload integration test coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-integration
          path: backend/coverage-integration.xml
          if-no-files-found: error
          retention-days: 30

  frontend-admin-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend-admin/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend admin
        run: npm run build

  edge-client-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: backend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: edge-client
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "edge-client/requirements-ci.txt"

      - name: Install edge-client CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run edge-client tests
        run: python -m pytest tests

  docker-image-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: app-security-scan
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ inputs.registry_org }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build Docker images
        uses: ./.github/actions/build-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Reclaim Docker builder cache
        run: docker builder prune -af

      - name: Generate SBOMs
        uses: ./.github/actions/sbom-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Trivy vulnerability scan
        uses: ./.github/actions/trivy-scan-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Combine Trivy SARIF reports
        if: ${{ always() && hashFiles('.artifacts/trivy/*.sarif') != '' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_paths = sorted(Path('.artifacts/trivy').glob('*.sarif'))
          combined = None
          results = []
          rules = {}

          for report_path in report_paths:
            document = json.loads(report_path.read_text(encoding='utf-8'))
            run = (document.get('runs') or [{}])[0]
            driver = run.get('tool', {}).get('driver', {})

            if combined is None:
              combined = {
                'version': document.get('version', '2.1.0'),
                '$schema': document.get('$schema', 'https://json.schemastore.org/sarif-2.1.0.json'),
                'runs': [run],
              }
              combined['runs'][0]['results'] = []
              combined['runs'][0].setdefault('tool', {}).setdefault('driver', {})['rules'] = []

            for rule in driver.get('rules', []):
              rule_id = rule.get('id')
              if rule_id and rule_id not in rules:
                rules[rule_id] = rule

            results.extend(run.get('results', []))

          if combined is None:
            raise SystemExit('No Trivy SARIF reports were generated.')

          combined['runs'][0]['tool']['driver']['rules'] = list(rules.values())
          combined['runs'][0]['results'] = results
          Path('.artifacts/trivy/combined.sarif').write_text(json.dumps(combined), encoding='utf-8')
          PY

      - name: Upload Trivy SARIF to code scanning
        if: ${{ always() && hashFiles('.artifacts/trivy/combined.sarif') != '' && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: .artifacts/trivy/combined.sarif
          category: app-container-images

      - name: Upload Trivy reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-reports
          path: .artifacts/trivy
          if-no-files-found: warn
          retention-days: 30

      - name: Upload SBOM reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-reports
          path: .artifacts/sbom
          if-no-files-found: warn
          retention-days: 30

      - name: Save built Docker images
        if: ${{ always() }}
        uses: ./.github/actions/save-images
        with:
          image_host: ghcr.io/${{ steps.image-meta.outputs.owner }}
          image_tag: ${{ inputs.image_tag }}
          catalog_path: ${{ inputs.catalog_path }}

      - name: Upload built image archives
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image-archives
          path: .artifacts/images
          if-no-files-found: warn
          retention-days: 1

  docker-smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - backend-unit-tests
      - backend-integration-tests
      - docker-image-verify
      - frontend-admin-build
      - edge-client-tests
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download built image archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image-archives
          path: .artifacts/images

      - name: Normalize image owner
        id: image-meta
        run: echo "owner=$(echo '${{ inputs.registry_org }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Load previously built Docker images
        uses: ./.github/actions/load-images
        with:
          catalog_path: ${{ inputs.catalog_path }}

      - name: Set up Python for e2e smoke tests
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install e2e smoke test dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Run compose-backed e2e smoke test
        env:
          COMPOSE_FILE_PATH: ${{ inputs.compose_file }}
          REGISTRY_ORG: ${{ steps.image-meta.outputs.owner }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: bash scripts/ci-e2e-test.sh