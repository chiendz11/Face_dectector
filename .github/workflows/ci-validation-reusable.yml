name: CI Validation Reusable

on:
  workflow_call:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run backend lint
        run: ruff check app tests

  platform-validate:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init for SSM
        working-directory: terraform/ssm
        run: terraform init -backend=false -input=false

      - name: Terraform validate for SSM
        working-directory: terraform/ssm
        run: terraform validate

      - name: Terraform init for EKS
        working-directory: terraform/eks
        run: terraform init -backend=false -input=false

      - name: Terraform validate for EKS
        working-directory: terraform/eks
        run: terraform validate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint Helm chart
        run: helm lint deploy/helm/face-detector

  security-scan:
    runs-on: ubuntu-latest
    needs: platform-validate
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit and pip-audit
        run: pip install bandit pip-audit

      - name: Run Python SAST scan
        run: bandit -r backend/app -q

      - name: Run backend dependency audit
        run: |
          # Temporary allowlist for known vulnerabilities in pinned dependencies.
          # Keep this list short and remove entries as dependencies are upgraded.
          pip-audit -r backend/requirements.txt --progress=off \
            --ignore-vuln CVE-2026-24486 \
            --ignore-vuln CVE-2026-40347 \
            --ignore-vuln PYSEC-2023-184 \
            --ignore-vuln GHSA-jh2j-j4j9-crg3 \
            --ignore-vuln CVE-2026-30922 \
            --ignore-vuln CVE-2025-62727

      - name: Run edge-client dependency audit
        run: pip-audit -r edge-client/requirements.txt --progress=off

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies for audit
        run: |
          cd frontend-admin
          npm ci

      - name: Run frontend dependency audit
        run: |
          cd frontend-admin
          npm audit --audit-level=high

  backend-tests:
    name: backend-unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: security-scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend unit tests
        run: pytest -m "not e2e and not integration" --tb=short -q

  backend-integration:
    name: backend-integration-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: backend-tests
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements-ci.txt"

      - name: Install backend CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run backend integration tests
        run: pytest -m integration --tb=short -q

  frontend-admin-build:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend-admin/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend admin
        run: npm run build

  edge-client-tests:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: edge-client
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "edge-client/requirements-ci.txt"

      - name: Install edge-client CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run edge-client tests
        run: python -m pytest tests
