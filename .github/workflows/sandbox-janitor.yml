name: Sandbox Janitor

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Janitor mode
        required: true
        default: ttl
        type: choice
        options:
          - ttl
          - nightly
      ttl_hours:
        description: Sandbox age threshold used when mode=ttl
        required: false
        default: '48'

permissions:
  contents: read

concurrency:
  group: sandbox-janitor
  cancel-in-progress: false

jobs:
  select-candidates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      candidates: ${{ steps.collect.outputs.candidates }}
      candidate_count: ${{ steps.collect.outputs.candidate_count }}
    env:
      JANITOR_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || (github.event.schedule == '0 15 * * *' && 'nightly' || 'ttl') }}
      TTL_HOURS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ttl_hours || '' }}
      REPO_VARS_JSON: ${{ toJson(vars) }}
    steps:
      - name: Select expired sandbox environments
        id: collect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const activeLabel = 'sandbox-active';
            const marker = '<!-- sandbox-lifecycle-status -->';
            const mode = process.env.JANITOR_MODE;
            const repoVars = JSON.parse(process.env.REPO_VARS_JSON || '{}');
            const ttlInputRaw = String(process.env.TTL_HOURS || '').trim();
            const ttlRepoVarRaw = String(repoVars.SANDBOX_TTL_HOURS || '').trim();
            const ttlHours = Number(ttlInputRaw || ttlRepoVarRaw || '48');
            if (!Number.isFinite(ttlHours) || ttlHours <= 0) {
              core.setFailed(
                `Invalid sandbox TTL value: dispatch='${ttlInputRaw || '(empty)'}', repoVar='${ttlRepoVarRaw || '(empty)'}'. Expected a positive number.`
              );
              return;
            }
            const now = Date.now();

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const candidates = pulls.filter((pull) => {
              if (pull.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                return false;
              }

              const labels = pull.labels.map((label) => label.name);
              if (!labels.includes(activeLabel)) {
                return false;
              }

              if (mode === 'nightly') {
                return true;
              }

              return true;
            });

            const selected = [];

            for (const pull of candidates) {
              if (mode === 'ttl') {
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pull.number,
                  per_page: 100,
                });

                const lifecycleComment = comments.find((comment) =>
                  comment.user.type === 'Bot' && comment.body.includes(marker)
                );

                const appliedAt = lifecycleComment?.updated_at || pull.created_at;
                const ageHours = (now - Date.parse(appliedAt)) / 36e5;
                if (!pull.draft && ageHours < ttlHours) {
                  core.info(`Skipping PR #${pull.number}; sandbox age ${ageHours.toFixed(1)}h is below the TTL.`);
                  continue;
                }
              }

              selected.push({
                pull_request_number: String(pull.number),
                source_ref_name: pull.head.ref,
                source_git_sha: pull.head.sha,
                owner_login: pull.user.login,
              });
            }

            core.setOutput('candidates', JSON.stringify(selected));
            core.setOutput('candidate_count', String(selected.length));
            core.info(`Janitor mode ${mode} selected ${selected.length} sandbox PR(s).`);

  destroy-candidates:
    needs: select-candidates
    if: needs.select-candidates.outputs.candidate_count != '0'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.select-candidates.outputs.candidates) }}
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/infrastructure.yml
    with:
      environment: sandbox
      action: destroy
      pull_request_number: ${{ matrix.pull_request_number }}
      source_ref_name: ${{ matrix.source_ref_name }}
      source_git_sha: ${{ matrix.source_git_sha }}
      owner_login: ${{ matrix.owner_login }}
    secrets: inherit