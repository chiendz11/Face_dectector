name: Sandbox Auto Apply

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
    branches:
      - master
  workflow_run:
    workflows:
      - App CI
      - Repo Security
      - Infra CI
      - Platform CI
      - Terraform PR Plan
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_run' && format('sandbox-auto-apply-{0}', github.event.workflow_run.head_branch) || format('sandbox-auto-apply-{0}', github.event.pull_request.head.ref) }}
  cancel-in-progress: true

jobs:
  evaluate-policy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
      issues: read
    outputs:
      should_apply: ${{ steps.gate.outputs.should_apply }}
      owner_login: ${{ steps.gate.outputs.owner_login }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      source_ref_name: ${{ steps.gate.outputs.source_ref_name }}
      source_git_sha: ${{ steps.gate.outputs.source_git_sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Resolve PR sandbox context
        id: pr_context
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            async function resolvePullRequest() {
              if (context.eventName === 'pull_request_target') {
                return context.payload.pull_request;
              }
              const workflowRun = context.payload.workflow_run;
              if (!workflowRun) return null;
              const linkedPulls = workflowRun.pull_requests || [];
              const candidate = linkedPulls.find((p) => p.base?.ref === (context.payload.repository?.default_branch || 'master')) || linkedPulls[0];
              if (!candidate) {
                const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: workflowRun.head_sha,
                });
                const defaultBranch = context.payload.repository?.default_branch || 'master';
                const pull = associated.data.find((p) => p.state === 'open' && p.base?.ref === defaultBranch) || associated.data.find((p) => p.state === 'open');
                if (!pull) return null;
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                });
                if (pr.head.sha !== workflowRun.head_sha) { core.info('stale workflow-run'); return null; }
                return pr;
              }
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: candidate.number,
              });
              if (pr.head.sha !== workflowRun.head_sha) { core.info('stale workflow-run'); return null; }
              return pr;
            }

            const pr = await resolvePullRequest();
            if (!pr) {
              core.info('no PR to resolve sandbox context for');
              core.setOutput('pr_found', 'false');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const paths = files.map(f => f.filename);
            fs.writeFileSync('.sandbox-policy-files', paths.join('\n'));

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const approversArray = Array.from(new Set(reviews.filter(r => r.state === 'APPROVED').map(r => r.user.login)));
            fs.writeFileSync('.sandbox-policy-approvers', JSON.stringify(approversArray));
            fs.writeFileSync('.sandbox-policy-approvals', String(approversArray.length));

            const syntheticEvent = {
              repository: context.payload.repository,
              sender: context.payload.sender || { login: context.actor },
              pull_request: pr,
            };
            fs.writeFileSync('.sandbox-policy-event.json', JSON.stringify(syntheticEvent, null, 2));

            const presentLabels = new Set((pr.labels || []).map(l => l.name));
            const repoOwner = context.repo.owner;
            const botUsers = new Set(['github-actions[bot]', 'dependabot[bot]']);
            const systemUsers = new Set(['github-actions[bot]']);
            const humanTrustedLabels = new Set(['allow-self-approve', 'deploy-sandbox', 'deploy-preview', 'skip-sandbox-approved']);
            const systemTrustedLabels = new Set(['sandbox-validated', 'sandbox-recommended', 'sandbox-required', 'ready-for-deploy']);
            const trackedLabels = [
              'allow-self-approve',
              'deploy-sandbox',
              'deploy-preview',
              'skip-sandbox-approved',
              'sandbox-validated',
              'sandbox-recommended',
              'sandbox-required',
              'ready-for-deploy',
            ];

            let headCommittedAt = pr.updated_at || '';
            try {
              const commit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });
              headCommittedAt = commit.data.commit.committer?.date || commit.data.commit.author?.date || headCommittedAt;
            } catch (error) {
              core.info(`Unable to resolve PR head commit timestamp: ${error.message}`);
            }

            const events = await github.paginate(github.rest.issues.listEvents, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const trust = {};
            for (const label of trackedLabels) {
              const labelEvents = events.filter((event) =>
                event.event === 'labeled' && event.label && event.label.name === label
              );
              const latest = labelEvents
                .sort((left, right) => Date.parse(left.created_at) - Date.parse(right.created_at))
                .pop();
              const actor = (latest && latest.actor && latest.actor.login) || '';
              const labeledAt = latest ? latest.created_at : null;
              const freshForHead = !headCommittedAt || !labeledAt || Date.parse(labeledAt) >= Date.parse(headCommittedAt);
              const trusted = presentLabels.has(label) && (
                (humanTrustedLabels.has(label) && actor === repoOwner && !botUsers.has(actor)) ||
                (systemTrustedLabels.has(label) && systemUsers.has(actor) && freshForHead)
              );
              trust[label] = {
                present: presentLabels.has(label),
                actor,
                trusted,
                labeledAt,
                freshForHead,
                headCommittedAt,
              };
            }

            fs.writeFileSync('.sandbox-policy-label-trust.json', JSON.stringify(trust, null, 2));
            core.setOutput('pr_found', 'true');
            core.setOutput('pr_number', String(pr.number));

      - name: Evaluate sandbox policy
        if: steps.pr_context.outputs.pr_found == 'true'
        run: |
          mkdir -p .artifacts/sandbox-policy
          python scripts/evaluate_sandbox_requirement.py \
            --event-path .sandbox-policy-event.json \
            --changed-files-path .sandbox-policy-files \
            --approvers-path .sandbox-policy-approvers \
            --codeowners-path .github/CODEOWNERS \
            --label-trust-path .sandbox-policy-label-trust.json \
            --approvals-path .sandbox-policy-approvals \
            --report-path .artifacts/sandbox-policy/report.json

      - name: Decide apply
        id: gate
        uses: actions/github-script@v9
        env:
          REPORT_FILE: .artifacts/sandbox-policy/report.json
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync(process.env.REPORT_FILE)) {
              core.info('no report file; skipping apply');
              core.setOutput('should_apply', 'false');
              core.setOutput('owner_login', '');
              core.setOutput('pr_number', '');
              core.setOutput('source_ref_name', '');
              core.setOutput('source_git_sha', '');
              return;
            }
            const report = JSON.parse(fs.readFileSync(process.env.REPORT_FILE, 'utf8'));
            // runtime error in evaluator -> do not apply
            if (report.decision === 'error') { core.info('evaluator runtime error; skip apply'); core.setOutput('should_apply', 'false'); return; }
            // Deployment is controlled by explicit owner intent, not by merge pass/fail.
            // Critical PRs may be merge-blocked while still being eligible for sandbox apply.
            if (!report.autoApplyEligible || !report.deployLabelTrusted) {
              core.info('report is not eligible for sandbox auto-apply');
              core.setOutput('should_apply', 'false');
              return;
            }

            const workflowPolicies = [
              { file: 'repo-security.yml', label: 'Repo Security', event: 'pull_request', always: true },
              { file: 'app-ci.yml', label: 'App CI', event: 'pull_request', always: false },
              { file: 'infra-ci.yml', label: 'Infra CI', event: 'pull_request', always: false },
              { file: 'platform-ci.yml', label: 'Platform CI', event: 'pull_request', always: false },
              { file: 'terraform-plan.yml', label: 'Terraform PR Plan', event: 'pull_request_target', always: false },
            ];
            const successConclusions = new Set(['success', 'neutral', 'skipped']);

            async function getLatestRun(workflow, headSha) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.file,
                event: workflow.event,
                head_sha: headSha,
                per_page: 100,
              });
              const candidates = runs.filter((run) => run.head_sha === headSha).sort((l, r) => Date.parse(r.created_at) - Date.parse(l.created_at));
              return candidates[0] || null;
            }

            async function evaluateWorkflowGates(headSha) {
              const pending = [];
              const failing = [];
              for (const workflow of workflowPolicies) {
                const latest = await getLatestRun(workflow, headSha);
                if (!latest) {
                  if (workflow.always) pending.push(`${workflow.label}: waiting for first run`);
                  continue;
                }
                if (latest.status !== 'completed') { pending.push(`${workflow.label}: ${latest.status}`); continue; }
                if (!successConclusions.has(latest.conclusion || '')) failing.push(`${workflow.label}: ${latest.conclusion || 'unknown'}`);
              }
              return { pending, failing };
            }

            async function resolvePullRequest() {
              if (context.eventName === 'pull_request_target') return context.payload.pull_request;
              const workflowRun = context.payload.workflow_run;
              if (!workflowRun) return null;
              const linkedPulls = workflowRun.pull_requests || [];
              const candidate = linkedPulls.find((p) => p.base?.ref === (context.payload.repository?.default_branch || 'master')) || linkedPulls[0];
              if (!candidate) {
                const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: workflowRun.head_sha,
                });
                const defaultBranch = context.payload.repository?.default_branch || 'master';
                const pull = associated.data.find((p) => p.state === 'open' && p.base?.ref === defaultBranch) || associated.data.find((p) => p.state === 'open');
                if (!pull) return null;
                const { data: pr } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pull.number });
                if (pr.head.sha !== workflowRun.head_sha) { core.info('stale workflow-run'); return null; }
                return pr;
              }
              const { data: pr } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: candidate.number });
              if (pr.head.sha !== workflowRun.head_sha) { core.info('stale workflow-run'); return null; }
              return pr;
            }

            const pr = await resolvePullRequest();
            if (!pr) { core.setOutput('should_apply', 'false'); return; }

            const labels = pr.labels.map(l => l.name);
            const deployLabels = ['deploy-sandbox', 'deploy-preview'];
            const deployLabel = deployLabels.find(label => labels.includes(label));
            if (!deployLabel) { core.info('no sandbox deploy label'); core.setOutput('should_apply', 'false'); return; }

            const { pending, failing } = await evaluateWorkflowGates(pr.head.sha);
            if (pending.length > 0 || failing.length > 0) { core.info('CI gates not ready'); core.setOutput('should_apply', 'false'); return; }

            core.setOutput('should_apply', 'true');
            core.setOutput('owner_login', pr.user.login);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('source_ref_name', pr.head.ref);
            core.setOutput('source_git_sha', pr.head.sha);

  enforce-quota:
    needs: evaluate-policy
    if: needs.evaluate-policy.outputs.should_apply == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce one sandbox per owner
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OWNER_LOGIN: ${{ needs.evaluate-policy.outputs.owner_login }}
          PR_NUMBER: ${{ needs.evaluate-policy.outputs.pr_number }}
        with:
          script: |
            const allPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const conflictingPulls = allPulls.filter((pull) => {
              if (String(pull.number) === process.env.PR_NUMBER) {
                return false;
              }

              if (pull.user.login !== process.env.OWNER_LOGIN) {
                return false;
              }

              if (pull.draft) {
                return false;
              }

              if (pull.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                return false;
              }

              const labels = pull.labels.map((label) => label.name);
              return labels.includes('sandbox-active');
            });

            if (conflictingPulls.length > 0) {
              core.setFailed(
                `Sandbox quota exceeded for @${process.env.OWNER_LOGIN}. Active sandbox PRs: ${conflictingPulls.map((pull) => `#${pull.number}`).join(', ')}`
              );
            }

  apply-infrastructure:
    needs:
      - evaluate-policy
      - enforce-quota
    if: github.event_name == 'pull_request_target' && needs.evaluate-policy.outputs.should_apply == 'true' && needs.enforce-quota.result == 'success'
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/infrastructure.yml
    with:
      environment: sandbox
      action: apply
      pull_request_number: ${{ needs.evaluate-policy.outputs.pr_number }}
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit

  signal-apply-ready:
    needs:
      - evaluate-policy
      - enforce-quota
    if: github.event_name == 'workflow_run' && needs.evaluate-policy.outputs.should_apply == 'true' && needs.enforce-quota.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Refresh ready-for-deploy label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ needs.evaluate-policy.outputs.pr_number }}
        with:
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            const label = 'ready-for-deploy';

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: [label],
            });

  bootstrap-sandbox:
    needs:
      - evaluate-policy
      - apply-infrastructure
    if: github.event_name == 'pull_request_target' && needs.evaluate-policy.outputs.should_apply == 'true' && needs.apply-infrastructure.result == 'success'
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: read
    uses: ./.github/workflows/app-cd.yml
    with:
      environment: sandbox
      git_revision: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      pull_request_number: ${{ needs.evaluate-policy.outputs.pr_number }}
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit

  mark-sandbox-validated:
    needs:
      - evaluate-policy
      - bootstrap-sandbox
    if: github.event_name == 'pull_request_target' && needs.evaluate-policy.outputs.should_apply == 'true' && needs.bootstrap-sandbox.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Refresh sandbox validation label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ needs.evaluate-policy.outputs.pr_number }}
          SOURCE_GIT_SHA: ${{ needs.evaluate-policy.outputs.source_git_sha }}
        with:
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: 'sandbox-validated',
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['sandbox-validated'],
            });

            const marker = '<!-- sandbox-validation-status -->';
            const body = [
              marker,
              '## Sandbox Validation',
              '',
              `Sandbox apply and bootstrap passed for head SHA \`${process.env.SOURCE_GIT_SHA}\`.`,
              '',
              'The `sandbox-validated` label was refreshed by GitHub Actions for this exact PR head.',
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
