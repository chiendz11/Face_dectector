name: Sandbox Auto Apply

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
    branches:
      - master
  workflow_run:
    workflows:
      - App CI
      - Repo Security
      - Infra CI
      - Platform CI
      - Terraform PR Plan
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_run' && format('sandbox-auto-apply-{0}', github.event.workflow_run.head_branch) || format('sandbox-auto-apply-{0}', github.event.pull_request.head.ref) }}
  cancel-in-progress: true

jobs:
  evaluate-policy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
      issues: read
    outputs:
      should_apply: ${{ steps.gate.outputs.should_apply }}
      owner_login: ${{ steps.gate.outputs.owner_login }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      source_ref_name: ${{ steps.gate.outputs.source_ref_name }}
      source_git_sha: ${{ steps.gate.outputs.source_git_sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Resolve changed files
        id: resolve_files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            async function resolvePullRequest() {
              if (context.eventName === 'pull_request_target') {
                return context.payload.pull_request;
              }
              const workflowRun = context.payload.workflow_run;
              if (!workflowRun) return null;
              const linkedPulls = workflowRun.pull_requests || [];
              const candidate = linkedPulls.find((p) => p.base?.ref === (context.payload.repository?.default_branch || 'master')) || linkedPulls[0];
              if (!candidate) return null;
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: candidate.number,
              });
              if (pr.head.sha !== workflowRun.head_sha) { core.info('stale workflow-run'); return null; }
              return pr;
            }

            const pr = await resolvePullRequest();
            if (!pr) { core.info('no PR to resolve changed files for'); return; }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const paths = files.map(f => f.filename);
            fs.writeFileSync('.sandbox-policy-files', paths.join('\n'));

      - name: Get PR approvals
        id: approvals
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const approversArray = Array.from(new Set(reviews.filter(r => r.state === 'APPROVED').map(r => r.user.login)));
            const fs = require('fs');
            fs.writeFileSync('.sandbox-policy-approvers', JSON.stringify(approversArray));
            fs.writeFileSync('.sandbox-policy-approvals', String(approversArray.length));
            core.setOutput('approval_count', approversArray.length);

      - name: Evaluate sandbox policy
        run: |
          mkdir -p .artifacts/sandbox-policy
          python scripts/evaluate_sandbox_requirement.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --changed-files-path .sandbox-policy-files \
            --approvers-path .sandbox-policy-approvers \
            --codeowners-path .github/CODEOWNERS \
            --approvals-path .sandbox-policy-approvals \
            --report-path .artifacts/sandbox-policy/report.json

      - name: Decide apply
        id: gate
        uses: actions/github-script@v7
        env:
          REPORT_FILE: .artifacts/sandbox-policy/report.json
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync(process.env.REPORT_FILE)) {
              core.info('no report file; skipping apply');
              core.setOutput('should_apply', 'false');
              core.setOutput('owner_login', '');
              core.setOutput('pr_number', '');
              core.setOutput('source_ref_name', '');
              core.setOutput('source_git_sha', '');
              return;
            }
            const report = JSON.parse(fs.readFileSync(process.env.REPORT_FILE, 'utf8'));
            // runtime error in evaluator -> do not apply
            if (report.decision === 'error') { core.info('evaluator runtime error; skip apply'); core.setOutput('should_apply', 'false'); return; }
            // governance block: absolute no-deploy
            if (report.block) { core.info(`governance block present: ${JSON.stringify(report.blockingReasons || [])}`); core.setOutput('should_apply', 'false'); return; }
            // maintain existing semantic: require explicit pass
            if (report.decision !== 'pass') { core.info('report not pass'); core.setOutput('should_apply', 'false'); return; }

            const workflowPolicies = [
              { file: 'repo-security.yml', label: 'Repo Security', event: 'pull_request', always: true },
              { file: 'app-ci.yml', label: 'App CI', event: 'pull_request', always: false },
              { file: 'infra-ci.yml', label: 'Infra CI', event: 'pull_request', always: false },
              { file: 'platform-ci.yml', label: 'Platform CI', event: 'pull_request', always: false },
              { file: 'terraform-plan.yml', label: 'Terraform PR Plan', event: 'pull_request_target', always: false },
            ];
            const successConclusions = new Set(['success', 'neutral', 'skipped']);

            async function getLatestRun(workflow, headSha) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.file,
                event: workflow.event,
                head_sha: headSha,
                per_page: 100,
              });
              const candidates = runs.filter((run) => run.head_sha === headSha).sort((l, r) => Date.parse(r.created_at) - Date.parse(l.created_at));
              return candidates[0] || null;
            }

            async function evaluateWorkflowGates(headSha) {
              const pending = [];
              const failing = [];
              for (const workflow of workflowPolicies) {
                const latest = await getLatestRun(workflow, headSha);
                if (!latest) {
                  if (workflow.always) pending.push(`${workflow.label}: waiting for first run`);
                  continue;
                }
                if (latest.status !== 'completed') { pending.push(`${workflow.label}: ${latest.status}`); continue; }
                if (!successConclusions.has(latest.conclusion || '')) failing.push(`${workflow.label}: ${latest.conclusion || 'unknown'}`);
              }
              return { pending, failing };
            }

            async function resolvePullRequest() {
              if (context.eventName === 'pull_request_target') return context.payload.pull_request;
              const workflowRun = context.payload.workflow_run;
              if (!workflowRun) return null;
              const linkedPulls = workflowRun.pull_requests || [];
              const candidate = linkedPulls.find((p) => p.base?.ref === (context.payload.repository?.default_branch || 'master')) || linkedPulls[0];
              if (!candidate) return null;
              const { data: pr } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: candidate.number });
              if (pr.head.sha !== workflowRun.head_sha) { core.info('stale workflow-run'); return null; }
              return pr;
            }

            const pr = await resolvePullRequest();
            if (!pr) { core.setOutput('should_apply', 'false'); return; }

            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('deploy-sandbox')) { core.info('no deploy-sandbox label'); core.setOutput('should_apply', 'false'); return; }

            // verify label actor was a human
            const events = await github.paginate(github.rest.issues.listEvents, { owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, per_page: 100 });
            const labelEvents = events.filter(e => e.event === 'labeled' && e.label && e.label.name === 'deploy-sandbox');
            if (labelEvents.length === 0) { core.info('no label events'); core.setOutput('should_apply', 'false'); return; }
            const last = labelEvents.sort((a, b) => Date.parse(a.created_at) - Date.parse(b.created_at)).pop();
            const actor = (last.actor && last.actor.login) || '';
            const botUsers = new Set(['github-actions[bot]', 'dependabot[bot]']);
            if (botUsers.has(actor)) { core.info('label added by bot; skip auto-apply'); core.setOutput('should_apply', 'false'); return; }

            const { pending, failing } = await evaluateWorkflowGates(pr.head.sha);
            if (pending.length > 0 || failing.length > 0) { core.info('CI gates not ready'); core.setOutput('should_apply', 'false'); return; }

            core.setOutput('should_apply', 'true');
            core.setOutput('owner_login', pr.user.login);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('source_ref_name', pr.head.ref);
            core.setOutput('source_git_sha', pr.head.sha);

  enforce-quota:
    needs: evaluate-policy
    if: needs.evaluate-policy.outputs.should_apply == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce one sandbox per owner
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          OWNER_LOGIN: ${{ needs.evaluate-policy.outputs.owner_login }}
          PR_NUMBER: ${{ needs.evaluate-policy.outputs.pr_number }}
        with:
          script: |
            const allPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const conflictingPulls = allPulls.filter((pull) => {
              if (String(pull.number) === process.env.PR_NUMBER) {
                return false;
              }

              if (pull.user.login !== process.env.OWNER_LOGIN) {
                return false;
              }

              if (pull.draft) {
                return false;
              }

              if (pull.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                return false;
              }

              const labels = pull.labels.map((label) => label.name);
              return labels.includes('sandbox-active');
            });

            if (conflictingPulls.length > 0) {
              core.setFailed(
                `Sandbox quota exceeded for @${process.env.OWNER_LOGIN}. Active sandbox PRs: ${conflictingPulls.map((pull) => `#${pull.number}`).join(', ')}`
              );
            }

  apply-infrastructure:
    needs:
      - evaluate-policy
      - enforce-quota
    if: needs.evaluate-policy.outputs.should_apply == 'true' && needs.enforce-quota.result == 'success'
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/infrastructure.yml
    with:
      environment: sandbox
      action: apply
      pull_request_number: ${{ needs.evaluate-policy.outputs.pr_number }}
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit

  bootstrap-sandbox:
    needs:
      - evaluate-policy
      - apply-infrastructure
    if: needs.evaluate-policy.outputs.should_apply == 'true' && needs.apply-infrastructure.result == 'success'
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    uses: ./.github/workflows/app-cd.yml
    with:
      environment: sandbox
      git_revision: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      pull_request_number: ${{ needs.evaluate-policy.outputs.pr_number }}
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit