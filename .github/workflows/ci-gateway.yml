name: CI Gateway

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write
  statuses: write

concurrency:
  group: ci-gateway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.classify.outputs.app_changed }}
      backend_changed: ${{ steps.classify.outputs.backend_changed }}
      frontend_admin_changed: ${{ steps.classify.outputs.frontend_admin_changed }}
      edge_client_changed: ${{ steps.classify.outputs.edge_client_changed }}
      nginx_changed: ${{ steps.classify.outputs.nginx_changed }}
      app_shared_changed: ${{ steps.classify.outputs.app_shared_changed }}
      image_names: ${{ steps.classify.outputs.image_names }}
      platform_changed: ${{ steps.classify.outputs.platform_changed }}
      infra_changed: ${{ steps.classify.outputs.infra_changed }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify change lanes
        id: classify
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          git diff --name-only "$base_sha" "$head_sha" > .changed-files
          python scripts/classify_ci_changes.py \
            --changed-files .changed-files \
            --github-output "$GITHUB_OUTPUT"

  verify-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      registry_org: ${{ github.repository_owner }}
      image_tag: ${{ github.sha }}
      run_backend: ${{ needs.detect-changes.outputs.app_shared_changed == 'true' || needs.detect-changes.outputs.backend_changed == 'true' }}
      run_frontend_admin: ${{ needs.detect-changes.outputs.app_shared_changed == 'true' || needs.detect-changes.outputs.frontend_admin_changed == 'true' }}
      run_edge_client: ${{ needs.detect-changes.outputs.app_shared_changed == 'true' || needs.detect-changes.outputs.edge_client_changed == 'true' }}
      run_nginx: ${{ needs.detect-changes.outputs.app_shared_changed == 'true' || needs.detect-changes.outputs.nginx_changed == 'true' }}
      run_app_security: ${{ needs.detect-changes.outputs.app_shared_changed == 'true' || needs.detect-changes.outputs.backend_changed == 'true' || needs.detect-changes.outputs.frontend_admin_changed == 'true' || needs.detect-changes.outputs.edge_client_changed == 'true' }}
      run_docker_images: ${{ needs.detect-changes.outputs.image_names != '' }}
      run_smoke_e2e: ${{ needs.detect-changes.outputs.app_shared_changed == 'true' }}
      image_names: ${{ needs.detect-changes.outputs.image_names }}
    secrets: inherit

  verify-platform:
    needs: detect-changes
    if: needs.detect-changes.outputs.platform_changed == 'true'
    uses: ./.github/workflows/reusable-platform-ci.yml

  verify-infra:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'
    uses: ./.github/workflows/reusable-infra-ci.yml

  gateway:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - verify-app
      - verify-platform
      - verify-infra
    if: always()
    steps:
      - name: Enforce lane outcomes
        shell: bash
        run: |
          app_changed="${{ needs.detect-changes.outputs.app_changed }}"
          backend_changed="${{ needs.detect-changes.outputs.backend_changed }}"
          frontend_admin_changed="${{ needs.detect-changes.outputs.frontend_admin_changed }}"
          edge_client_changed="${{ needs.detect-changes.outputs.edge_client_changed }}"
          nginx_changed="${{ needs.detect-changes.outputs.nginx_changed }}"
          app_shared_changed="${{ needs.detect-changes.outputs.app_shared_changed }}"
          image_names="${{ needs.detect-changes.outputs.image_names }}"
          platform_changed="${{ needs.detect-changes.outputs.platform_changed }}"
          infra_changed="${{ needs.detect-changes.outputs.infra_changed }}"

          detect_result="${{ needs.detect-changes.result }}"
          app_result="${{ needs.verify-app.result }}"
          platform_result="${{ needs.verify-platform.result }}"
          infra_result="${{ needs.verify-infra.result }}"

          if [ "$detect_result" != "success" ]; then
            echo "Change detection failed with result: $detect_result"
            exit 1
          fi

          if [ "$app_changed" = "true" ] && [ "$app_result" != "success" ]; then
            echo "App lane failed with result: $app_result"
            exit 1
          fi

          if [ "$platform_changed" = "true" ] && [ "$platform_result" != "success" ]; then
            echo "Platform lane failed with result: $platform_result"
            exit 1
          fi

          if [ "$infra_changed" = "true" ] && [ "$infra_result" != "success" ]; then
            echo "Infra lane failed with result: $infra_result"
            exit 1
          fi

          echo "CI Gateway passed. app_changed=$app_changed, platform_changed=$platform_changed, infra_changed=$infra_changed"
          echo "App lanes: backend=$backend_changed frontend_admin=$frontend_admin_changed edge_client=$edge_client_changed nginx=$nginx_changed shared=$app_shared_changed images=$image_names"
