name: Nightly Dependency Security Scan

# Runs daily on master — results go to GitHub Security tab (SARIF).
# This is the "source of truth" for CVE tracking.
# It does NOT block any PR or deployment.
#
# When a new CVE is found:
#   1. GitHub creates a Dependabot/code-scanning alert automatically.
#   2. Security team reviews and either:
#      a. Adds an exception to policies/pip-audit-ignore.txt (fast-track PR)
#      b. Bumps the affected package directly
#   SLA: Critical 24h / High 7d / Medium 30d / Low 90d

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:     # allow manual trigger

permissions:
  contents: read
  security-events: write # upload SARIF to GitHub Security tab

jobs:
  pip-audit-sarif:
    name: pip-audit → GitHub Security tab
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout master
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      - name: Build ignore args from policy file
        id: audit-ignore
        run: |
          IGNORE_ARGS=$(grep -v '^#' policies/pip-audit-ignore.txt | grep -v '^[[:space:]]*$' | awk '{print "--ignore-vuln", $1}' | tr '\n' ' ')
          echo "args=${IGNORE_ARGS}" >> "$GITHUB_OUTPUT"

      # Run pip-audit for each component; convert JSON → SARIF; merge into one file.
      # continue-on-error so we always upload even when vulns are found.
      - name: Scan backend
        continue-on-error: true
        run: |
          mkdir -p .artifacts/pip-audit
          pip-audit -r backend/requirements.txt --progress=off \
            ${{ steps.audit-ignore.outputs.args }} \
            --format=json --output=.artifacts/pip-audit/backend.json

      - name: Scan edge-client
        continue-on-error: true
        run: |
          pip-audit -r edge-client/requirements.txt --progress=off \
            ${{ steps.audit-ignore.outputs.args }} \
            --format=json --output=.artifacts/pip-audit/edge-client.json

      - name: Convert pip-audit JSON to SARIF
        if: always()
        run: |
          python - <<'EOF'
          import json, pathlib, datetime, sys

          TOOL = {
              "driver": {
                  "name": "pip-audit",
                  "version": "2.9.0",
                  "informationUri": "https://github.com/pypa/pip-audit",
                  "rules": [],
              }
          }
          results = []
          rule_ids = set()

          for audit_file in pathlib.Path(".artifacts/pip-audit").glob("*.json"):
              component = audit_file.stem
              try:
                  data = json.loads(audit_file.read_text())
              except (json.JSONDecodeError, FileNotFoundError):
                  continue
              for dep in data.get("dependencies", []):
                  for vuln in dep.get("vulns", []):
                      vid = vuln["id"]
                      if vid not in rule_ids:
                          rule_ids.add(vid)
                          TOOL["driver"]["rules"].append({
                              "id": vid,
                              "name": vid,
                              "shortDescription": {"text": vuln.get("description", vid)},
                              "helpUri": f"https://osv.dev/vulnerability/{vid}",
                              "defaultConfiguration": {"level": "error"},
                          })
                      results.append({
                          "ruleId": vid,
                          "level": "error",
                          "message": {
                              "text": (
                                  f"{dep['name']} {dep['version']} is affected by {vid}. "
                                  f"Fix version(s): {', '.join(v.get('fix_versions', ['none'])) or 'unknown'}. "
                                  f"Component: {component}"
                              )
                          },
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {
                                      "uri": f"{component}/requirements.txt",
                                      "uriBaseId": "%SRCROOT%",
                                  },
                                  "region": {"startLine": 1},
                              }
                          }],
                      })

          sarif = {
              "version": "2.1.0",
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "runs": [{"tool": TOOL, "results": results}],
          }
          pathlib.Path(".artifacts/pip-audit/results.sarif").write_text(json.dumps(sarif, indent=2))
          print(f"SARIF generated: {len(results)} finding(s) across {len(rule_ids)} unique CVE(s)")
          EOF

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3
        with:
          sarif_file: .artifacts/pip-audit/results.sarif
          category: pip-audit

      - name: Upload raw pip-audit findings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-pip-audit-${{ github.run_id }}
          path: .artifacts/pip-audit/
          if-no-files-found: warn
          retention-days: 90
