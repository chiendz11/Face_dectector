name: GitOps Production Promotion

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: gitops-production-promotion
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: read
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Fetch release tags
        run: git fetch --force --tags origin

      - name: Resolve release commit
        id: release-context
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          RELEASE_SHA=$(git rev-list -n 1 "$RELEASE_TAG")
          if [ -z "$RELEASE_SHA" ]; then
            echo "Unable to resolve release tag $RELEASE_TAG." >&2
            exit 1
          fi
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Resolve published image digests
        id: image-digests
        env:
          IMAGE_TAG: ${{ steps.release-context.outputs.release_sha }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          BACKEND_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-backend" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          FRONTEND_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-admin" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          NGINX_DIGEST=$(python scripts/resolve_registry_digest.py --repository "${OWNER}/face-detector-nginx" --reference "$IMAGE_TAG" --username "$REGISTRY_USERNAME" --password "$REGISTRY_PASSWORD")
          echo "backend_digest=$BACKEND_DIGEST" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=$FRONTEND_DIGEST" >> "$GITHUB_OUTPUT"
          echo "nginx_digest=$NGINX_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Update production image digests
        env:
          IMAGE_TAG: ${{ steps.release-context.outputs.release_sha }}
        run: |
          python scripts/update_gitops_image_locks.py \
            --values-file deploy/helm/face-detector/values-production.yaml \
            --image-tag "$IMAGE_TAG" \
            --backend-digest "${{ steps.image-digests.outputs.backend_digest }}" \
            --frontend-digest "${{ steps.image-digests.outputs.frontend_digest }}" \
            --nginx-digest "${{ steps.image-digests.outputs.nginx_digest }}"

      - name: Commit production promotion
        env:
          IMAGE_TAG: ${{ steps.release-context.outputs.release_sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- deploy/helm/face-detector/values-production.yaml; then
            echo "Production values already point to $IMAGE_TAG."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/face-detector/values-production.yaml
          git commit -m "gitops: promote production ${RELEASE_TAG} [skip ci]"
          git push origin HEAD:${TARGET_BRANCH}