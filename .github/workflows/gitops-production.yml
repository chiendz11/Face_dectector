name: GitOps Production Promotion

on:
  release:
    types:
      - published

concurrency:
  group: gitops-production-promotion
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Fetch release tags
        run: git fetch --force --tags origin

      - name: Resolve release commit
        id: release-context
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          RELEASE_SHA=$(git rev-list -n 1 "$RELEASE_TAG")
          if [ -z "$RELEASE_SHA" ]; then
            echo "Unable to resolve release tag $RELEASE_TAG." >&2
            exit 1
          fi
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Update production image tags
        env:
          IMAGE_TAG: ${{ steps.release-context.outputs.release_sha }}
        run: |
          python - <<'PY'
import os
from pathlib import Path

import yaml

path = Path('deploy/helm/face-detector/values-production.yaml')
data = yaml.safe_load(path.read_text(encoding='utf-8')) or {}
for component in ('backend', 'worker', 'frontendAdmin'):
    data.setdefault(component, {}).setdefault('image', {})['tag'] = os.environ['IMAGE_TAG']
path.write_text(yaml.safe_dump(data, sort_keys=False), encoding='utf-8')
PY

      - name: Commit production promotion
        env:
          IMAGE_TAG: ${{ steps.release-context.outputs.release_sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- deploy/helm/face-detector/values-production.yaml; then
            echo "Production values already point to $IMAGE_TAG."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/face-detector/values-production.yaml
          git commit -m "gitops: promote production ${RELEASE_TAG} [skip ci]"
          git push origin HEAD:${TARGET_BRANCH}