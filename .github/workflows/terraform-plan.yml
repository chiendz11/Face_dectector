name: Terraform PR Plan

on:
  pull_request_target:
    branches:
      - main
      - master
    paths:
      - "terraform/**"
      - "deploy/runtime/**"
      - "scripts/resolve_workflow_context.py"
      - ".github/workflows/infrastructure.yml"
      - ".github/workflows/app-cd.yml"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-plan-reusable.yml"

permissions:
  contents: read

jobs:
  evaluate-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_plan: ${{ steps.gate.outputs.should_plan }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      source_ref_name: ${{ steps.gate.outputs.source_ref_name }}
      source_git_sha: ${{ steps.gate.outputs.source_git_sha }}
      owner_login: ${{ steps.gate.outputs.owner_login }}
    steps:
      - name: Evaluate sandbox plan policy
        id: gate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput('should_plan', sameRepo ? 'true' : 'false');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('source_ref_name', pr.head.ref);
            core.setOutput('source_git_sha', pr.head.sha);
            core.setOutput('owner_login', pr.user.login);

            if (!sameRepo) {
              core.info('Skipping terraform sandbox plan for forked pull requests.');
            }

  plan:
    needs: evaluate-policy
    if: needs.evaluate-policy.outputs.should_plan == 'true'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      pull_request_number: ${{ needs.evaluate-policy.outputs.pr_number }}
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit
