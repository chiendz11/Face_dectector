name: Repo Security

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: repo-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run repo-wide secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scripts-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Bandit and Semgrep
        run: python -m pip install bandit semgrep

      - name: Run Bandit on helper scripts
        run: bandit -r scripts -x scripts/tests -q

      - name: Run Semgrep on helper scripts
        run: semgrep scan --config p/python --error --metrics=off --exclude scripts/tests scripts