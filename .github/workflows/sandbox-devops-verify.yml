name: Sandbox DevOps Verify

on:
  workflow_dispatch:
    inputs:
      action:
        description: Sandbox admin action to run from the selected devops/* branch
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      approval_environment:
        description: Protected environment gate for the DevOps admin lane
        required: true
        default: devops-admin-sandbox
        type: environment

concurrency:
  group: ${{ format('sandbox-devops-verify-{0}-{1}-{2}', github.actor, github.ref_name, github.event.inputs.action || 'apply') }}
  cancel-in-progress: true

jobs:
  evaluate-policy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      action: ${{ steps.gate.outputs.action }}
      source_ref_name: ${{ steps.gate.outputs.source_ref_name }}
      source_git_sha: ${{ steps.gate.outputs.source_git_sha }}
      owner_login: ${{ steps.gate.outputs.owner_login }}
    steps:
      - name: Validate devops admin dispatch policy
        id: gate
        uses: actions/github-script@v7
        env:
          APPROVAL_ENVIRONMENT: ${{ github.event.inputs.approval_environment || '' }}
          REQUESTED_ACTION: ${{ github.event.inputs.action || 'apply' }}
        with:
          script: |
            const refName = context.ref.replace('refs/heads/', '');
            if (!refName.startsWith('devops/')) {
              core.setFailed('Sandbox DevOps Verify may only be dispatched from a devops/* branch.');
              return;
            }

            if (process.env.APPROVAL_ENVIRONMENT !== 'devops-admin-sandbox') {
              core.setFailed('Sandbox DevOps Verify must use the protected environment devops-admin-sandbox.');
              return;
            }

            let allowedActorsJson = '';
            try {
              const variable = await github.rest.actions.getRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'DEVOPS_ADMIN_ALLOWED_ACTORS_JSON',
              });
              allowedActorsJson = String(variable.data.value || '').trim();
            } catch (error) {
              core.setFailed(
                'Repository variable DEVOPS_ADMIN_ALLOWED_ACTORS_JSON must exist and contain a JSON array of approved GitHub logins before the DevOps admin lane can run.'
              );
              return;
            }

            if (!allowedActorsJson) {
              core.setFailed(
                'Repository variable DEVOPS_ADMIN_ALLOWED_ACTORS_JSON must be set to a JSON array of approved GitHub logins before the DevOps admin lane can run.'
              );
              return;
            }

            let allowedActors;
            try {
              allowedActors = JSON.parse(allowedActorsJson);
            } catch (error) {
              core.setFailed(`DEVOPS_ADMIN_ALLOWED_ACTORS_JSON must be valid JSON. ${error.message}`);
              return;
            }

            if (!Array.isArray(allowedActors) || allowedActors.length === 0) {
              core.setFailed('DEVOPS_ADMIN_ALLOWED_ACTORS_JSON must be a non-empty JSON array of approved GitHub logins.');
              return;
            }

            if (!allowedActors.includes(context.actor)) {
              core.setFailed(
                `Actor @${context.actor} is not approved for the DevOps admin lane. Allowed actors: ${allowedActors.join(', ')}`
              );
              return;
            }

            core.setOutput('action', process.env.REQUESTED_ACTION);
            core.setOutput('source_ref_name', refName);
            core.setOutput('source_git_sha', context.sha);
            core.setOutput('owner_login', context.actor);

  require-approval:
    needs: evaluate-policy
    runs-on: ubuntu-latest
    permissions: {}
    environment: ${{ github.event.inputs.approval_environment }}
    steps:
      - name: Await DevOps environment approval
        run: echo "DevOps admin lane approved for @${{ needs.evaluate-policy.outputs.owner_login }} on ${{ needs.evaluate-policy.outputs.source_ref_name }}"

  apply-sandbox:
    needs:
      - evaluate-policy
      - require-approval
    if: needs.evaluate-policy.outputs.action == 'apply'
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    uses: chiendz11/Face_dectector/.github/workflows/infrastructure.yml@master
    with:
      environment: sandbox
      action: apply
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit

  bootstrap-sandbox:
    needs:
      - evaluate-policy
      - require-approval
      - apply-sandbox
    if: needs.evaluate-policy.outputs.action == 'apply' && needs.apply-sandbox.result == 'success'
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    uses: chiendz11/Face_dectector/.github/workflows/app-cd.yml@master
    with:
      environment: sandbox
      git_revision: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit

  destroy-sandbox:
    needs:
      - evaluate-policy
      - require-approval
    if: needs.evaluate-policy.outputs.action == 'destroy'
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    uses: chiendz11/Face_dectector/.github/workflows/infrastructure.yml@master
    with:
      environment: sandbox
      action: destroy
      source_ref_name: ${{ needs.evaluate-policy.outputs.source_ref_name }}
      source_git_sha: ${{ needs.evaluate-policy.outputs.source_git_sha }}
      owner_login: ${{ needs.evaluate-policy.outputs.owner_login }}
    secrets: inherit
