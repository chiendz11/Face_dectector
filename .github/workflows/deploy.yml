name: Deploy VPS Services

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend-admin/**"
      - "nginx/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy deployable services to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend,frontend-admin,nginx,docker-compose.yml,.env.example"
          target: "/opt/face-detector"

      - name: Restart backend, admin, and nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/face-detector
            cp .env.example .env || true
            docker compose up -d --build --remove-orphans backend worker frontend-admin nginx
