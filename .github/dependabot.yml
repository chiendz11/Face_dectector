version: 2
updates:
  # Keep GitHub Actions and SHA-pinned action references current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
      - "security"

  # Backend Python dependencies.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  # Edge client Python dependencies.
  - package-ecosystem: "pip"
    directory: "/edge-client"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:40"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  # Frontend dependencies.
  - package-ecosystem: "npm"
    directory: "/frontend-admin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # Enrollment station dependencies.
  - package-ecosystem: "npm"
    directory: "/enrollment-station"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:10"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # Infrastructure dependencies.
  - package-ecosystem: "terraform"
    directory: "/terraform/ssm"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/eks"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:10"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"

  # Docker base image updates.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:00"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/edge-client"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:10"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/frontend-admin"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:20"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/enrollment-station"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:25"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/nginx"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:30"
      timezone: "UTC"
    target-branch: "master"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
