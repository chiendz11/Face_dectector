name: Trivy Scan Images
description: >
  Run Trivy vulnerability scan on all images listed in the image catalog.
  Outputs SARIF reports to .artifacts/trivy/<name>.sarif.
  Fails on HIGH/CRITICAL unfixed CVEs.

inputs:
  image_host:
    description: "Registry host + org prefix, e.g. ghcr.io/myorg"
    required: true
  image_tag:
    description: "Docker image tag"
    required: true
  catalog_path:
    description: "Repo-relative path to the image catalog JSON file"
    default: ".github/image-catalog.json"
  ignore_file:
    description: "Optional Trivy ignore file path"
    default: ".trivyignore"
  trivy_version:
    description: "Trivy container image version tag"
    default: "0.53.0"

runs:
  using: composite
  steps:
    - name: Scan images with Trivy
      shell: bash
      env:
        IMAGE_HOST: ${{ inputs.image_host }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        CATALOG: ${{ inputs.catalog_path }}
        TRIVY_IGNORE_FILE: ${{ inputs.ignore_file }}
        TRIVY_VERSION: ${{ inputs.trivy_version }}
      run: |
        mkdir -p .artifacts/trivy
        status=0
        ignore_mount_args=()
        ignore_args=()
        if [ -n "$TRIVY_IGNORE_FILE" ] && [ -f "$TRIVY_IGNORE_FILE" ]; then
          ignore_mount_args+=( -v "${PWD}/${TRIVY_IGNORE_FILE}:/tmp/trivyignore:ro" )
          ignore_args+=(--ignorefile /tmp/trivyignore)
        fi

        while IFS= read -r row; do
          name=$(echo "$row" | jq -r '.name')
          repo=$(echo "$row" | jq -r '.repository')
          ref="$IMAGE_HOST/$repo:$IMAGE_TAG"
          echo "::group::Trivy scan $name"
          if ! docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}/.artifacts/trivy:/reports" \
            "${ignore_mount_args[@]}" \
            "aquasec/trivy:${TRIVY_VERSION}" image \
            --scanners vuln \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output "/reports/${name}.sarif" \
            --exit-code 1 \
            "${ignore_args[@]}" \
            "$ref"; then
            status=1
          fi
          echo "::endgroup::"
        done < <(jq -c '.[]' "$CATALOG")

        exit "$status"
