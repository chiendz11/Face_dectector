name: Save Docker Images
description: >
  Save all images listed in the image catalog to tar archives so downstream jobs
  can load the exact same image bits without rebuilding.

inputs:
  image_host:
    description: "Registry host + org prefix, e.g. ghcr.io/myorg"
    required: true
  image_tag:
    description: "Docker image tag (commit SHA or semver)"
    required: true
  catalog_path:
    description: "Repo-relative path to the image catalog JSON file"
    default: ".github/image-catalog.json"
  output_dir:
    description: "Directory where image tar archives will be written"
    default: ".artifacts/images"

runs:
  using: composite
  steps:
    - name: Save images from catalog
      shell: bash
      env:
        IMAGE_HOST: ${{ inputs.image_host }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        CATALOG: ${{ inputs.catalog_path }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        mkdir -p "$OUTPUT_DIR"

        while IFS= read -r row; do
          name=$(echo "$row" | jq -r '.name')
          repo=$(echo "$row" | jq -r '.repository')
          ref="$IMAGE_HOST/$repo:$IMAGE_TAG"
          archive="$OUTPUT_DIR/${name}.tar"

          echo "::group::Save $name → $archive"
          docker image inspect "$ref" > /dev/null
          docker save -o "$archive" "$ref"
          echo "::endgroup::"
        done < <(jq -c '.[]' "$CATALOG")