# docker-compose.ci-override.yml
#
# CI-only Compose override.
# Mounts a rate-limiting-free nginx config so automated integration tests
# cannot be throttled by the production rate-limiter (5 r/s / burst 10).
#
# Usage:
#   docker compose -f docker-compose.ghcr.yml -f docker-compose.ci-override.yml up -d
#
# The ci-integration-test.sh script applies this override automatically when
# this file is present in the project root.

services:
  nginx:
    volumes:
      - ./nginx/nginx.ci.conf:/etc/nginx/nginx.conf:ro
